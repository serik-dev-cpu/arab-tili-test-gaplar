// Доирали "медалион" — арабий безак услубидаги нуқта-чизиқлар билан ўралган,
// ҳарбий лента-медалга ўхшамайдиган, ўрнига талабага хос белги шакли
function medallionSVG(iconKey, color, locked, size){
  size = size || 64;
  const muted = '#3A4B5A';
  const ringColor = locked ? '#2A3545' : color;
  const iconColor = locked ? muted : color;
  let ticks = '';
  if(!locked){
    for(let i=0;i<8;i++){
      const a = i*45*Math.PI/180;
      const x1=(32+26.5*Math.cos(a)).toFixed(1), y1=(32+26.5*Math.sin(a)).toFixed(1);
      const x2=(32+29.5*Math.cos(a)).toFixed(1), y2=(32+29.5*Math.sin(a)).toFixed(1);
      ticks += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="1.4" opacity="0.55"/>`;
    }
  }
  const iconFn = ICON_PATHS[iconKey] || ICON_PATHS.star;
  return `<svg viewBox="0 0 64 64" width="${size}" height="${size}" style="display:block;">
    <circle cx="32" cy="32" r="30" fill="none" stroke="${ringColor}" stroke-width="${locked?1:1.6}" opacity="${locked?0.4:0.6}"/>
    <circle cx="32" cy="32" r="24.5" fill="none" stroke="${ringColor}" stroke-width="1" opacity="${locked?0.25:0.35}"/>
    ${ticks}
    <g transform="translate(20,20)" opacity="${locked?0.55:1}">${iconFn(iconColor)}</g>
  </svg>`;
}

const ACH_KEY = 'arabic_achievements_v1';
let _achMemory = null;

function loadAchievements(){
  if(_achMemory) return _achMemory;
  try{
    const d=JSON.parse(localStorage.getItem(ACH_KEY)||'{}');
    _achMemory={xp:Number(d.xp)||0,unlocked:new Set(d.unlocked||[]),streak:Number(d.streak)||0,
      lastDate:d.lastDate||'',hasPerfect:!!d.hasPerfect,hasBlitzAce:!!d.hasBlitzAce,
      hasHeartsWin:!!d.hasHeartsWin,hasSpeedRun:!!d.hasSpeedRun,maxCombo:Number(d.maxCombo)||0};
  }catch{
    _achMemory={xp:0,unlocked:new Set(),streak:0,lastDate:'',hasPerfect:false,hasBlitzAce:false,hasHeartsWin:false,hasSpeedRun:false,maxCombo:0};
  }
  return _achMemory;
}
function saveAchievements(a){
  _achMemory=a;
  try{ localStorage.setItem(ACH_KEY, JSON.stringify({xp:a.xp,unlocked:[...a.unlocked],streak:a.streak,
    lastDate:a.lastDate,hasPerfect:a.hasPerfect,hasBlitzAce:a.hasBlitzAce,hasHeartsWin:a.hasHeartsWin,
    hasSpeedRun:a.hasSpeedRun||false,maxCombo:a.maxCombo||0})); }catch{}
}

function updateAchievements(roundResult, mode, correct, total){
  const ach = loadAchievements();
  // XP hisoblash: to'g'ri javob = 3 XP, 100% = bonus 20, blitz = x1.5
  let xpGained = correct * 3;
  if(correct===total) xpGained += 20;
  if(mode==='blitz') xpGained = Math.round(xpGained * 1.5);
  if(mode==='yazma') xpGained = xpGained * 2; // ✍️ Ёзма режим XP ×2
  ach.xp += xpGained;

  // Streak yangilash
  const today = new Date().toLocaleDateString('uz-UZ');
  const yesterday = new Date(Date.now()-86400000).toLocaleDateString('uz-UZ');
  if(ach.lastDate===today){ /* bugun allaqachon hisoblangan */ }
  else if(ach.lastDate===yesterday){ ach.streak++; ach.lastDate=today; }
  else { ach.streak=1; ach.lastDate=today; }

  // Maxsus shartlar
  if(correct===total) ach.hasPerfect=true;
  if(mode==='blitz'&&correct===30) ach.hasBlitzAce=true;
  if(mode==='hearts'&&correct===total) ach.hasHeartsWin=true;

  // Yangi medallar tekshiruvi
  const combined = {xp:ach.xp, learned:state.learned, streak:ach.streak,
    hasPerfect:ach.hasPerfect, hasBlitzAce:ach.hasBlitzAce, hasHeartsWin:ach.hasHeartsWin};
  const newlyUnlocked = [];
  ACHIEVEMENTS.forEach(a=>{
    if(!ach.unlocked.has(a.id) && a.check(combined)){
      ach.unlocked.add(a.id);
      newlyUnlocked.push(a);
    }
  });

  saveAchievements(ach);
  return {xpGained, newlyUnlocked, ach};
}

// AUDIO (Web Audio API)

let _actx = null;
function getACtx(){
  if(!_actx){ try{ _actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(_actx && _actx.state==='suspended') _actx.resume();
  return _actx;
}
function tone(freq,type,dur,vol,delay){
  const a=getACtx(); if(!a)return;
  try{
    const o=a.createOscillator(), g=a.createGain();
    o.connect(g); g.connect(a.destination);
    o.type=type||'sine'; o.frequency.value=freq;
    const t=a.currentTime+(delay||0);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol||0.1,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+(dur||0.2));
    o.start(t); o.stop(t+(dur||0.2)+0.05);
  }catch(e){}
}
function sndCorrect(){ tone(523,'sine',.22,.09,0); tone(659,'sine',.22,.09,.08); tone(784,'sine',.28,.09,.16); }
function sndWrong(){ tone(320,'triangle',.25,.08,0); tone(240,'triangle',.25,.08,.12); }
function sndTimeout(){ tone(440,'sine',.12,.07,0); tone(400,'sine',.12,.07,.14); tone(360,'sine',.15,.07,.28); }
function sndCombo(n){
  if(n>=20){[523,659,784,1047,1319,1568].forEach((f,i)=>tone(f,'sine',.4,.11,i*.09));return;}
  if(n>=15){[440,554,659,880,1108].forEach((f,i)=>tone(f,'sine',.35,.10,i*.1));return;}
  if(n>=10){[523,659,784,1047].forEach((f,i)=>tone(f,'sine',.3,.10,i*.1));return;}
  const b=440+n*30; tone(b,'sine',.15,.08,0); tone(b*1.25,'sine',.15,.08,.1); tone(b*1.5,'sine',.2,.09,.2);
}

function launchFireworks(){
  const cv=document.createElement('canvas');
  cv.style.cssText='position:fixed;inset:0;z-index:500;pointer-events:none';
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  document.body.appendChild(cv);
  const ctx=cv.getContext('2d');
  const colors=['#FFD700','#FF6B6B','#7CC87C','#5B8FD6','#C9A84C','#FF00FF','#FF8E53','#fff'];
  const parts=[];
  for(let i=0;i<140;i++){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*5;
    parts.push({x:cv.width*(.2+Math.random()*.6),y:cv.height*(.15+Math.random()*.4),
      vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,color:colors[i%colors.length],
      sz:3+Math.random()*4,life:1,dec:.011+Math.random()*.011});
  }
  let fr;
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    let alive=false;
    parts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.13; p.life-=p.dec;
      if(p.life<=0)return; alive=true;
      ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
      ctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
    });
    ctx.globalAlpha=1;
    if(alive) fr=requestAnimationFrame(draw); else cv.remove();
  }
  draw();
  sndFirework();
  setTimeout(()=>{cancelAnimationFrame(fr);cv.remove();},4000);
}

function shuffle(a){ return [...a].sort(()=>Math.random()-.5); }
function el(tag,props,children){
  const e=document.createElement(tag);
  if(props) Object.entries(props).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object'){
      Object.keys(v).forEach(function(sk){
        var sv=v[sk];
        if(typeof sv==='number'&&sk!=='opacity'&&sk!=='zIndex'&&sk!=='flex'&&sk!=='flexGrow'&&sk!=='order'){
          sv=sv+'px';
        }
        e.style[sk]=sv;
      });
    }
    else if(k.startsWith('on')){ e.addEventListener(k.slice(2).toLowerCase(),v); }
    else if(k==='className'){ e.className=v; }
    else { e.setAttribute(k,v); }
  });
  if(children){
    (Array.isArray(children)?children:[children]).forEach(c=>{
      if(c==null||c===false)return;
      e.appendChild(typeof c==='string'?document.createTextNode(c):c);
    });
  }
  return e;
}
function div(style,children){ return el('div',{style},children); }
function btn(style,txt,onclick){ const b=el('button',{style,onClick:onclick},[txt]); return b; }

// QUIZ ENGINE
// ═══════════════════════════════════
let quizState = null;

function buildQuiz(){
  const mode=selectedMode, cat=selectedCat;
  const learned=state.learned;
  let pool = cat ? ALL_WORDS.filter(w=>w.cat===cat) : ALL_WORDS;
  const count = mode==='blitz'?30:20;
  // SRS (Leitner qutisi): box qanча кичик булса, сўз шунча кўп такрорланади.
  // Кўрилмаган сўз ва хато қилинган сўз (box=1) энг юқори устуворликка эга,
  // яхши ўзлаштирилган сўз (box=5) камроқ такрорланади.
  const box = state.box||{};
  const weight = w => Math.max(1, 6-(box[w.ar]||1));
  let weighted = [];
  pool.forEach(w=>{ const wt=weight(w); for(let i=0;i<wt;i++) weighted.push(w); });
  let sel = [];
  { const seenAr=new Set();
    shuffle(weighted).forEach(w=>{ if(sel.length<count && !seenAr.has(w.ar)){ seenAr.add(w.ar); sel.push(w);} });
    if(sel.length<count){
      shuffle(pool).forEach(w=>{ if(sel.length<count && !seenAr.has(w.ar)){ seenAr.add(w.ar); sel.push(w);} });
    }
  }
  if(sel.length<4) sel=shuffle(ALL_WORDS).slice(0,count);
  return sel.map(w=>{
    const dir=Math.random()<.5?'ar2uz':'uz2ar';
    if(mode==='yazma'){
      return {word:w, dir, choices:[]};
    }
    const others=shuffle(ALL_WORDS.filter(x=>x.ar!==w.ar)).slice(0,3);
    return {word:w, dir, choices:shuffle([w,...others])};
  });
}

function renderQuizScreen(){
  if(!quizState || quizState.done){
    quizState={
      questions:buildQuiz(), idx:0, results:[], combo:0, hearts:3,
      correctCount:0, answered:false, selected:null, timeLeft:0,
      timer:null, tStart:Date.now(), qStart:Date.now(), done:false,
      comboMsg:null, bonusMsg:null
    };
  }
  const qs=quizState;
  const mode=selectedMode;
  const timerMax=mode==='blitz'?5:mode==='yazma'?0:selectedTime;

  const wrap=div({minHeight:'100vh',background:'#0F1419',color:'#E8E6E1',position:'relative',overflow:'hidden'});
  const inner=div({maxWidth:'440px',margin:'0 auto',padding:'0 16px 40px'});

  // Back button
  const qHdrMain=div({padding:'10px 0 2px',display:'flex',alignItems:'center'});
  const backBtnMain=el('button',{
    style:{background:'#161D27',border:'1px solid #2A3545',borderRadius:'8px',
      padding:'5px 10px',color:'#7A8B99',fontSize:'11px'},
    onClick:()=>{clearInterval(qs.timer);quizState=null;screen='mode';render();}
  },['← Орқа']);
  qHdrMain.appendChild(backBtnMain);
  inner.appendChild(qHdrMain);

  function startTimer(){
    clearInterval(qs.timer);
    if(mode==='yazma'){ qs.timeLeft=0; return; }
    qs.timeLeft=timerMax;
    qs.qStart=Date.now();
    qs.timer=setInterval(()=>{
      qs.timeLeft--;
      if(qs.timeLeft<=0){ clearInterval(qs.timer); handleAnswer(null,true); }
      else updateTimerDisplay();
    },1000);
  }

  function handleAnswer(choice, auto, userText){
    if(qs.answered) return;
    clearInterval(qs.timer);
    qs.answered=true;
    const q=qs.questions[qs.idx];
    let correct=false;

    if(mode==='yazma'){
      // ══ НОРМАЛИЗАЦИЯ ФУНКЦИЯЛАРИ ══

      // Арабча харакатларни олиб ташлаш
      const stripAr = s => s
        .replace(/[\u0610-\u061A\u064B-\u065F\u0670\u06D6-\u06DC\u06DF-\u06E4\u06E7\u06E8\u06EA-\u06ED]/g,'')
        .trim();

      // Тиниш ва пробелларни тозалаш
      const clean = s => s.toLowerCase()
        .replace(/[.,،؛;:!?'"()\[\]{}\-]/g,'')
        .replace(/\s+/g,' ').trim();

      // Матн Кирилл ҳарфларини ўз ичига олаётганини текшириш
      const hasCyrillic = s => /[а-яёА-ЯЁөғқңүұҳәіӣўҷ]/i.test(s);
      const hasLatin    = s => /[a-zA-Z]/.test(s);

      // Лотин → Кирилл конвертация (апостроф, е, қ тўғри)
      const lat2cyr = s => {
        let r = s;
        // 1. o', g' → ў, ғ (апостроф олдин)
        r = r.replace(/o[''`ʻʼ\u02bc\u2018\u2019]/gi,'ў')
             .replace(/g[''`ʻʼ\u02bc\u2018\u2019]/gi,'ғ');
        // 2. Қолган апострофлар → ъ (fe'l=феъл, ma'no=маъно)
        r = r.replace(/[''`ʻʼ\u02bc\u2018\u2019]/g,'ъ');
        // 3. Кўп ҳарфли бирикмалар
        r = r.replace(/sh/gi,'ш').replace(/ch/gi,'ч').replace(/ng/gi,'нг')
             .replace(/ya/gi,'я').replace(/yo/gi,'ё').replace(/yu/gi,'ю');
        // 4. Якка ҳарфлар: e→е (э эмас), q→қ, k→к, h→х
        const m={a:'а',b:'б',d:'д',e:'е',f:'ф',g:'г',h:'х',i:'и',j:'ж',
                 k:'к',l:'л',m:'м',n:'н',o:'о',p:'п',q:'қ',r:'р',
                 s:'с',t:'т',u:'у',v:'в',x:'х',y:'й',z:'з'};
        return r.replace(/[a-z]/gi,c=>m[c.toLowerCase()]||c);
      };

      const isAr = q.dir==='ar2uz';
      const givenRaw = (userText||'').trim();

      if(!givenRaw){ auto=true; correct=false; }
      else if(isAr){
        // ═══ ЎЗБЕКЧА ЖАВОБ ТЕКШИРУВИ ═══
        const correctRaw = q.word.uz;
        // Барча вариантларни кирилл нормада тайёрла
        // Қавс ичидаги қўшимча маълумотни олиб ташла: "кўрди (-ҳум)" → "кўрди"
        const stripBrackets = s => s.replace(/\([^)]*\)/g,'').replace(/\[[^\]]*\]/g,'');
        const variants = correctRaw.split(/[\/,،]/).map(v => clean(stripBrackets(v)));

        const givenClean = clean(givenRaw);
        // Агар Кирилл — тўғридан текшир. Агар Лотин — аввал конвертация (апостроф сақланади), кейин clean
        const givenCyr = hasCyrillic(givenRaw)
          ? givenClean
          : clean(lat2cyr(givenRaw.toLowerCase()));

        correct = variants.some(cv => cv === givenClean || cv === givenCyr);

        // Юмшоқ текшируш: ъ/ь/махсус ҳарфларни тушириб солиштир
        if(!correct){
          const strip = s => s.replace(/[ъьўғқҳ']/g,'');
          correct = variants.some(cv => strip(cv) === strip(givenCyr) && strip(cv).length > 1);
        }
      } else {
        // ═══ АРАБЧА ЖАВОБ ТЕКШИРУВИ — ҳаракатсиз ҳам қабул ═══
        const correctAr = q.word.ar;
        const cStrip = stripAr(clean(correctAr));
        const gStrip = stripAr(clean(givenRaw));
        correct = gStrip.length > 0 && gStrip === cStrip;
      }

      qs.selected = {ar: q.word.ar, userText: givenRaw};
    } else {
      correct = !auto && choice && choice.ar===q.word.ar;
      qs.selected = auto?{ar:'__timeout__'}:choice;
    }

    if(auto && mode!=='yazma'){ sndTimeout(); }
    else if(correct){
      sndCorrect();
      qs.combo++; qs.correctCount++;
      if(qs.correctCount===20||(mode==='blitz'&&qs.correctCount===30)){
        setTimeout(()=>launchFireworks(),300);
      }
      const MSGS=[
        {at:3,e:'🔥',m:'Комбо ×3!',c:'#E87D54'},
        {at:5,e:'⚡',m:'Ўт олдингиз!',c:'#C9A84C'},
        {at:8,e:'💥',m:'Тўхтатиб бўлмайди!',c:'#7CC87C'},
        {at:10,e:'🌟',m:'ЛЕГЕНДА!',c:'#FFD700'},
        {at:15,e:'🚀',m:'РАКЕТА ×15!',c:'#FF6B6B'},
        {at:20,e:'👑',m:'МАСТЕР ×20!',c:'#FF00FF'},
      ];
      const cm=MSGS.find(x=>x.at===qs.combo);
      if(cm){ qs.comboMsg=cm; sndCombo(qs.combo); setTimeout(()=>{qs.comboMsg=null;refreshCombo();},1500); refreshCombo(); }
    } else {
      sndWrong(); qs.combo=0;
      if(mode==='hearts'){ qs.hearts=Math.max(0,qs.hearts-1); }
    }

    const elapsed=(Date.now()-qs.qStart)/1000;
    qs.results.push({
      word:q.word, dir:q.dir,
      chosen: mode==='yazma'?{ar:q.word.ar}:auto?null:choice,
      correct,
      timeSpent:Math.min(elapsed, timerMax||30),
      userText: mode==='yazma'?(userText||''):undefined
    });

    updateUI();

    const delay=mode==='blitz'?800:1400;
    setTimeout(()=>{
      if(mode==='hearts'&&qs.hearts<=0){finishQuiz();return;}
      if(qs.idx<qs.questions.length-1){
        qs.idx++; qs.answered=false; qs.selected=null;
        renderQuestion();
        startTimer();
      } else { finishQuiz(); }
    },delay);
  }

  function finishQuiz(){
    clearInterval(qs.timer);
    const newLearned=new Set(state.learned);
    const newMistakes={...state.mistakes};
    qs.results.forEach(r=>{
      if(r.correct) newLearned.add(r.word.ar);
      if(!r.correct) newMistakes[r.word.ar]=(newMistakes[r.word.ar]||0)+1;
    });
    const newBox={...(state.box||{})};
    qs.results.forEach(r=>{
      const curBox=newBox[r.word.ar]||1;
      newBox[r.word.ar]=r.correct?Math.min(5,curBox+1):1;
    });
    const correct=qs.results.filter(r=>r.correct).length;
    const pct=Math.round(correct/qs.results.length*100);
    const totalSec=Math.round((Date.now()-qs.tStart)/1000);
    state.learned=newLearned;
    state.mistakes=newMistakes;
    state.box=newBox;
    state.rounds=[...state.rounds,{date:new Date().toLocaleDateString('uz-UZ'),correct,score:correct,total:qs.results.length,pct,mode,totalSec}];
    saveProgress(state);
    state._xp=(state._xp||0)+(correct*3)+(correct===qs.results.length?20:0)+(mode==='yazma'?correct*3:0)+(mode==='blitz'?Math.round(correct*1.5):0);
    // XP va achievements
    const {xpGained, newlyUnlocked, ach: updatedAch} = updateAchievements(qs.results, mode, correct, qs.results.length);
    state._xp = updatedAch ? updatedAch.xp : (state._xp||0);
    setTimeout(()=>{ showXPToast(xpGained); },600);
    if(newlyUnlocked.length>0) setTimeout(()=>{ showAchievementToast(newlyUnlocked); },1200);
    screen='results'; render();
  }

  // Build question area
  const qArea=div({id:'q-area'});
  inner.appendChild(qArea);

  function renderQuestion(){
    const q=qs.questions[qs.idx];
    const isAr=q.dir==='ar2uz';
    const timerMax2=mode==='blitz'?5:mode==='yazma'?0:selectedTime;
    const tpct=mode==='yazma'?100:(qs.timeLeft/timerMax2*100);
    const danger=mode==='yazma'?false:qs.timeLeft<=(mode==='blitz'?2:6);

    qArea.innerHTML='';
    qArea.className='fade-in';

    // Header
    const header=div({padding:'14px 0 8px'});
    const hrow=div({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'});
    hrow.appendChild(h('span',{fontSize:'11px',color:'#7A8B99',background:'#161D27',border:'1px solid #2A3545',borderRadius:'20px',padding:'3px 10px'},currentName+' · '+(qs.idx+1)+'/'+qs.questions.length));
    
    const hright=div({display:'flex',gap:'8px',alignItems:'center'});
    if(mode==='hearts'){
      const hh=div({display:'flex',gap:'3px'});
      for(let i=0;i<3;i++) hh.appendChild(h('span',{fontSize:'16px',opacity:i<qs.hearts?'1':'.2'},'❤️'));
      hright.appendChild(hh);
    }
    if(qs.combo>=2) hright.appendChild(h('span',{fontSize:'11px',fontWeight:'700',background:'#E87D5433',border:'1px solid #E87D5466',borderRadius:'20px',padding:'3px 10px',color:'#E87D54'},'🔥 x'+qs.combo));
    hright.appendChild(h('span',{fontSize:'11px',fontWeight:'600',background:'#0a2e18',border:'1px solid #3CB37166',borderRadius:'20px',padding:'3px 10px',color:'#3CB371'},'✅ '+qs.results.filter(r=>r.correct).length));
    hrow.appendChild(hright);
    header.appendChild(hrow);
    
    // Mode badge
    const mb=div({display:'flex',gap:'6px',marginBottom:'6px'});
    mb.appendChild(h('span',{fontSize:'9px',color:'#4A5B6A',background:'#161D27',border:'1px solid #2A3545',borderRadius:'10px',padding:'2px 8px',letterSpacing:'1px'},
      mode==='blitz'?'⚡ BLITZ':mode==='hearts'?'❤️ ЖОНЛИ':mode==='category'?'📂 '+selectedCat:'✍️ ЁЗМА'));
    header.appendChild(mb);
    
    // Progress bar
    const prog=div({height:'3px',background:'#1C2533',borderRadius:'2px'});
    const pf=div({height:'3px',background:'linear-gradient(90deg,#C9A84C,#E8C96A)',borderRadius:'2px',width:(qs.idx/qs.questions.length*100)+'%',transition:'width .3s'});
    prog.appendChild(pf); header.appendChild(prog);
    qArea.appendChild(header);

    // Question card
    const card=div({background:'#161D27',border:`1px solid ${danger?'#E87D5466':'#2A3545'}`,borderRadius:'16px',padding:'18px 16px 14px',marginBottom:'10px',position:'relative'});
    card.appendChild(h('div',{textAlign:'center',fontSize:'9px',letterSpacing:'2px',color:CAT_COLORS[q.word.cat]||'#7A8B99',textTransform:'uppercase',marginBottom:'2px'},q.word.cat));
    card.appendChild(h('div',{textAlign:'center',fontSize:'9px',color:'#4A5B6A',letterSpacing:'2px',textTransform:'uppercase',marginBottom:'10px'},isAr?'Арабча → Ўзбекча':'Ўзбекча → Арабча'));
    card.appendChild(h('div',{textAlign:'center',minHeight:'60px',display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:isAr?'52px':'19px',color:'#C9A84C',marginBottom:'10px',lineHeight:'1.4',
      fontFamily:isAr?'Georgia,serif':'inherit',direction:isAr?'rtl':'ltr'},
      isAr?q.word.ar:T(q.word.uz)));

    // Timer bar
    const tb=div({height:'5px',background:'#0F1419',borderRadius:'3px',overflow:'hidden'});
    const tf=el('div',{id:'timer-fill',style:{height:'5px',borderRadius:'3px',
      background:danger?'#E87D54':qs.combo>=3?'#7CC87C':'#C9A84C',
      width:tpct+'%',transition:'width 1s linear, background .3s'}});
    tb.appendChild(tf); card.appendChild(tb);
    
    const trow=div({display:'flex',justifyContent:'space-between',fontSize:'10px',marginTop:'3px'});
    trow.appendChild(h('span',{color:'#4A5B6A'},'Алманҳажул · 5-бўлим'));
    if(mode!=='yazma'){
      const tnEl=el('span',{id:'timer-num',style:{color:danger?'#E87D54':'#4A5B6A',fontWeight:danger?'700':'400'}},[qs.timeLeft+'с']);
      trow.appendChild(tnEl);
    } else {
      trow.appendChild(h('span',{color:'#C9A84C',fontWeight:'600',fontSize:'9px'},'✍️ XP×2'));
    }
    card.appendChild(trow);
    qArea.appendChild(card);

    // Choices / Yazma input
    if(mode==='yazma'){
      // ═══ ЁЗМА РЕЖИМ INPUT БЛОКИ ═══
      const inputWrap=div({marginBottom:'9px'});
      const isArInp=q.dir==='ar2uz';
      const correctAnswer=isArInp?q.word.uz:q.word.ar;

      // Hint state
      let hintLevel=0; // 0=йўқ, 1=1-ҳарф, 2=2-ҳарф, 3=тўлиқ

      // Hint label
      const hintLabel=h('div',{fontSize:'10px',color:'#7A8B99',marginBottom:'6px',textAlign:'center'},
        isArInp?'👇 Ўзбекча таржимасини ёзинг':'👇 Арабча ёзинг (ҳаракатсиз ҳам бўлади)');
      inputWrap.appendChild(hintLabel);

      const inp=el('input',{
        type:'text',
        placeholder: isArInp?'Ўзбекча жавоб...':'عربي...',
        maxlength:'80',
        style:{
          width:'100%',padding:'15px 16px',borderRadius:'13px',
          border:'2px solid #2A3545',background:'#1C2533',
          color:'#E8E6E1',fontSize: isArInp?'17px':'32px',textAlign:'center',
          direction: isArInp?'ltr':'rtl',
          fontFamily: isArInp?'inherit':'Georgia,serif',
          display:'block',lineHeight:'1.5'
        }
      });
      inp.addEventListener('keydown',e=>{
        if(e.key==='Enter' && !qs.answered){ handleAnswer(null,false,inp.value); }
      });
      inputWrap.appendChild(inp);

      // Подсказка блоки
      const hintBox=div({
        textAlign:'center',minHeight:'22px',fontSize:'15px',
        color:'#C9A84C',letterSpacing:'3px',marginTop:'6px',
        fontFamily:isArInp?'inherit':'Georgia,serif',
        direction:isArInp?'ltr':'rtl'
      });
      inputWrap.appendChild(hintBox);

      // Тугмалар қатори
      const btnRow=div({display:'flex',gap:'7px',marginTop:'8px'});

      // 💡 Подсказка тугмаси
      const hintBtn=el('button',{
        style:{
          flex:'1',padding:'11px',borderRadius:'12px',
          border:'1px solid #C9A84C55',background:'#1a1505',
          color:'#C9A84C',fontWeight:'600',fontSize:'13px'
        },
        onClick:()=>{
          if(qs.answered) return;
          hintLevel=Math.min(hintLevel+1, correctAnswer.length);
          const shown=correctAnswer.slice(0,hintLevel);
          const hidden='_ '.repeat(correctAnswer.length-hintLevel).trim();
          hintBox.textContent=shown+(hidden?' '+hidden:'');
          hintBtn.textContent='💡 '+(hintLevel>=correctAnswer.length?'Тўлиқ':'Яна (+1)');
          // Hint ишлатилса XP камаяди — badge янгиланади
          hintBox.style.color=hintLevel>=correctAnswer.length?'#E87D54':'#C9A84C';
        }
      },['💡 Подсказка']);
      btnRow.appendChild(hintBtn);

      // ✅ Текшириш тугмаси
      const confirmBtn=el('button',{
        style:{
          flex:'2',padding:'13px',borderRadius:'12px',
          border:'none',
          background:'linear-gradient(135deg,#C9A84C,#E8C96A)',
          color:'#0F1419',fontWeight:'700',fontSize:'15px'
        },
        onClick:()=>{ if(!qs.answered) handleAnswer(null,false,inp.value); }
      },['✅ Текшириш']);
      btnRow.appendChild(confirmBtn);
      inputWrap.appendChild(btnRow);

      // ⏭️ Билмадим
      const skipBtn=el('button',{
        style:{
          width:'100%',padding:'10px',borderRadius:'12px',
          border:'1px solid #2A3545',marginTop:'6px',
          background:'#161D27',color:'#4A5B6A',fontSize:'12px'
        },
        onClick:()=>{ if(!qs.answered) handleAnswer(null,true,''); }
      },['⏭️ Билмадим (ўтказиб юбориш)']);
      inputWrap.appendChild(skipBtn);

      qArea.appendChild(inputWrap);
      qArea.appendChild(div({id:'feedback',minHeight:'40px'}));
      setTimeout(()=>{ try{ inp.focus(); }catch(e){} },80);

    } else {
      // ═══ CHOICES РЕЖИМЛАРИ ═══
      const choicesDiv=el('div',{id:'choice-btns',style:{display:'flex',flexDirection:'column',gap:'9px',marginBottom:'9px'}});
      q.choices.forEach(ch=>{
        const isChoice=q.dir==='uz2ar';
        const cb=el('button',{
          style:{padding:'14px 16px',borderRadius:'13px',border:'2px solid #2A3545',
            background:'#1C2533',color:'#E8E6E1',
            fontSize:isChoice?'26px':'15px',
            fontFamily:isChoice?'Georgia,serif':'inherit',direction:isChoice?'rtl':'ltr',
            textAlign:'center',lineHeight:'1.4',width:'100%',
            transition:'background 0.18s ease, border-color 0.18s ease'},
          onClick:()=>handleAnswer(ch)
        },[isChoice?ch.ar:T(ch.uz)]);
        choicesDiv.appendChild(cb);
      });
      qArea.appendChild(choicesDiv);
      qArea.appendChild(div({id:'feedback',minHeight:'36px'}));
    }
  }

  function updateTimerDisplay(){
    const tf=document.getElementById('timer-fill');
    const tn=document.getElementById('timer-num');
    const timerMax2=mode==='blitz'?5:selectedTime;
    const danger=qs.timeLeft<=(mode==='blitz'?2:6);
    if(tf){ tf.style.width=(qs.timeLeft/timerMax2*100)+'%'; tf.style.background=danger?'#E87D54':qs.combo>=3?'#7CC87C':'#C9A84C'; }
    if(tn){ tn.textContent=qs.timeLeft+'с'; tn.style.color=danger?'#E87D54':'#4A5B6A'; }
  }

  function updateUI(){
    const q=qs.questions[qs.idx];
    const isAr=q.dir==='ar2uz';
    const correct=q.word;
    const lastResult=qs.results.length>0?qs.results[qs.results.length-1]:null;
    const isCorrect=lastResult&&lastResult.correct;

    if(mode==='yazma'){
      // Input ва тугмаларни disable қилиш
      const inp=qArea.querySelector('input');
      const btns=qArea.querySelectorAll('button');
      if(inp){
        inp.disabled=true;
        inp.style.borderColor=isCorrect?'#3CB371':'#C0392B';
        inp.style.background=isCorrect?'#0a3020':'#3a0a0a';
        inp.style.color=isCorrect?'#7CC87C':'#E87D54';
      }
      btns.forEach(b=>{ b.disabled=true; b.style.opacity='0.5'; });
      // Feedback
      const fb=document.getElementById('feedback');
      if(fb){
        fb.style.cssText='text-align:center;padding:10px 12px;border-radius:8px;font-size:12px;font-weight:600;margin-top:6px;';
        if(isCorrect){
          fb.style.background='#0a2e1822'; fb.style.border='1px solid #3CB37133'; fb.style.color='#3CB371';
          fb.textContent='✅ Тўғри, барокалла!';
        } else {
          fb.style.background='#2e0a0a22'; fb.style.border='1px solid #C0392B33'; fb.style.color='#E87D54';
          const ans=isAr?T(correct.uz):correct.ar;
          const ansStyle=isAr?'font-size:13px':'font-family:Georgia,serif;font-size:20px;direction:rtl';
          fb.innerHTML='❌ Хато! Тўғри жавоб: <span style="color:#C9A84C;'+ansStyle+'">'+ans+'</span>';
        }
      }
    } else {
      // Choices режими
      const isTimeout=qs.selected&&qs.selected.ar==='__timeout__';
      const isCorrectC=!isTimeout&&qs.selected&&qs.selected.ar===correct.ar;
      const btns=document.querySelectorAll('#choice-btns button');
      btns.forEach((b,i)=>{
        if(i>=q.choices.length)return;
        const ch=q.choices[i];
        if(ch.ar===correct.ar){
          b.style.background='#0a3020'; b.style.borderColor='#3CB371';
          b.style.color='#7CC87C'; b.style.fontWeight='700';
          b.style.boxShadow='0 0 12px #3CB37144';
          b.textContent='✅ '+(isAr?T(ch.uz):ch.ar);
        }
        else if(qs.selected&&ch.ar===qs.selected.ar){
          b.style.background='#3a0a0a'; b.style.borderColor='#C0392B';
          b.style.color='#E87D54'; b.style.boxShadow='0 0 10px #C0392B44';
          b.textContent='❌ '+(isAr?T(ch.uz):ch.ar);
        }
        b.disabled=true;
      });
      const fb=document.getElementById('feedback');
      if(fb){
        fb.style.cssText='text-align:center;padding:8px 12px;border-radius:8px;font-size:11px;font-weight:600;';
        if(isTimeout){ fb.style.background='#2a1e0822'; fb.style.border='1px solid #E87D5433'; fb.style.color='#E87D54';
          fb.textContent='⏰ Вақт тугади! Тўғриси: '+(isAr?T(correct.uz):correct.ar); }
        else if(isCorrectC){ fb.style.background='#0a2e1822'; fb.style.border='1px solid #3CB37133'; fb.style.color='#3CB371';
          fb.textContent='✅ Тўғри, барокалла!'; }
        else { fb.style.background='#2e0a0a22'; fb.style.border='1px solid #C0392B33'; fb.style.color='#E87D54';
          fb.textContent='❌ Хато! Тўғриси: '+(isAr?T(correct.uz):correct.ar); }
      }
    }
  }

  let comboOverlay=null;
  function refreshCombo(){
    if(comboOverlay){ comboOverlay.remove(); comboOverlay=null; }
    if(!qs.comboMsg) return;
    const cm=qs.comboMsg;
    comboOverlay=div({
      position:'fixed',top:'50%',left:'50%',transform:'translate(-50%,-50%)',
      zIndex:'100',textAlign:'center',pointerEvents:'none',
      width:'70%',maxWidth:'260px',
      background:'rgba(0,0,0,0.75)',borderRadius:'20px',
      padding:'14px 12px',border:`1px solid ${cm.c}44`,
      animation:'comboIn .4s cubic-bezier(.34,1.56,.64,1) forwards'
    },[
      h('div',{fontSize:'44px',marginBottom:'6px'},cm.e),
      h('div',{fontSize:'15px',fontWeight:'800',color:cm.c,textShadow:`0 0 20px ${cm.c}`,lineHeight:'1.3'},cm.m)
    ]);
    wrap.appendChild(comboOverlay);
  }

  renderQuestion();
  startTimer();
  wrap.appendChild(inner);
  return wrap;
}

// RESULTS
// ═══════════════════════════════════
function renderResults(){
  const qs=quizState;
  const results=qs.results;
  const correct=results.filter(r=>r.correct).length;
  const pct=Math.round(correct/results.length*100);
  const lc=state.learned.size;
  const mistakes=results.filter(r=>!r.correct);
  
  const wrap=div({minHeight:'100vh',background:'#0F1419',color:'#E8E6E1',overflowY:'auto'});

  const motTitle={100:'Сиз УСТАСИЗ!',90:'Аъло натижа!',75:'Зўр кетяпсиз!',50:'Илгарилаш бор!',30:'Машқ давом этсин!',0:'Яна уриб кўр!'};
  const mk=Object.keys(motColors).reverse().find(k=>pct>=k);
  const mc=motColors[mk], me=motEmoji[mk], mt=motTitle[mk];

  const sc=div({textAlign:'center',padding:'20px 18px 18px',marginBottom:'10px',
    background:`linear-gradient(135deg,${mc}15,#161D27)`,border:`1px solid ${mc}44`,borderRadius:'18px'});
  sc.appendChild(h('div',{fontSize:'40px',marginBottom:'6px'},me));
  sc.appendChild(h('div',{fontSize:'16px',fontWeight:'700',color:mc,marginBottom:'4px'},currentName+', '+mt));
  sc.appendChild(h('div',{fontSize:'36px',fontWeight:'700',color:mc},correct+'/'+results.length));
  const badges=div({display:'flex',justifyContent:'center',gap:'8px',marginTop:'8px',flexWrap:'wrap'});
  badges.appendChild(h('span',{background:mc+'22',border:`1px solid ${mc}44`,color:mc,borderRadius:'20px',padding:'3px 12px',fontWeight:'700',fontSize:'13px'},pct+'%'));
  sc.appendChild(badges);
  inner.appendChild(sc);

  // Always-visible mistakes
  if(mistakes.length>0){
    const mCard=div({background:'#161D27',border:'1px solid #C0392B33',borderRadius:'12px',padding:'10px 12px',marginBottom:'10px'});
    mCard.appendChild(h('div',{fontSize:'10px',fontWeight:'600',color:'#E87D54',marginBottom:'6px'},'❌ Бу раунддаги хатолар ('+mistakes.length+' та)'));
    const mGrid=div({display:'flex',flexWrap:'wrap',gap:'6px'});
    mistakes.slice(0,9).forEach(r=>{
      const mc2=div({background:'#2e0a0a',border:'1px solid #C0392B33',borderRadius:'8px',padding:'4px 8px',textAlign:'center',minWidth:'60px'});
      mc2.appendChild(h('div',{fontFamily:'Georgia,serif',fontSize:'18px',color:'#C9A84C',direction:'rtl'},r.word.ar));
      mc2.appendChild(h('div',{fontSize:'8px',color:'#7A8B99',maxWidth:'70px',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'},T(r.word.uz)));
      mGrid.appendChild(mc2);
    });
    if(mistakes.length>9) mGrid.appendChild(h('div',{fontSize:'9px',color:'#4A5B6A',alignSelf:'center'},'+'+(mistakes.length-9)+' та'));
    mCard.appendChild(mGrid);
    inner.appendChild(mCard);
  } else {
    inner.appendChild(h('div',{background:'#0a2e18',border:'1px solid #3CB37133',borderRadius:'10px',padding:'8px 12px',marginBottom:'10px',textAlign:'center',fontSize:'12px',color:'#7CC87C'},'🎉 Бу раундда хато йўқ!'));
  }

  // Global progress
  const gPct=Math.round(lc/TOTAL*100);
  const gpCard=div({background:'#161D27',border:'1px solid #2A3545',borderRadius:'12px',padding:'12px',marginBottom:'10px'});
  gpCard.appendChild(h('div',{fontSize:'11px',fontWeight:'600',color:'#C9A84C',marginBottom:'8px'},'📊 Умумий ўрганиш жараёни'));
  const gpRow=div({display:'flex',justifyContent:'space-between',fontSize:'10px',marginBottom:'4px'});
  gpRow.appendChild(h('span',{color:'#7A8B99'},TOTAL+' та сўздан'));
  gpRow.appendChild(h('span',{color:'#C9A84C',fontWeight:'700'},lc+' / '+TOTAL+' · '+gPct+'%'));
  gpCard.appendChild(gpRow);
  const gpb=div({height:'6px',background:'#0F1419',borderRadius:'3px',overflow:'hidden',marginBottom:'8px'});
  gpb.appendChild(div({height:'6px',background:'linear-gradient(90deg,#C9A84C,#E8C96A)',borderRadius:'3px',width:gPct+'%'}));
  gpCard.appendChild(gpb);
  // XP row in results
  const rAch=loadAchievements();
  const xpResRow=div({display:'flex',justifyContent:'space-between',alignItems:'center'});
  xpResRow.appendChild(h('span',{fontSize:'10px',color:'#7CC87C',fontWeight:'700'},'⭐ '+rAch.xp+' Илм'));
  const achResBtn=el('button',{
    style:{fontSize:'10px',color:'#C9A84C',background:'#1a1a2e',border:'1px solid #C9A84C44',
      borderRadius:'8px',padding:'3px 10px'},
    onClick:()=>{screen='achievements';render();}
  },['🏅 '+rAch.unlocked.size+'/'+ACHIEVEMENTS.length+' медалл →']);
  xpResRow.appendChild(achResBtn);
  gpCard.appendChild(xpResRow);
  inner.appendChild(gpCard);

  // Buttons
  const retryBtn=el('button',{
    style:{width:'100%',padding:'14px',borderRadius:'12px',border:'none',marginBottom:'8px',
      background:'linear-gradient(135deg,#C9A84C,#E8C96A)',color:'#0F1419',fontWeight:'700',fontSize:'15px'},
    onClick:()=>{ quizState=null; screen='quiz'; render(); }

function renderZamirlarQuiz(){
  const pool = zamirFilter==='munfasil'?MUNFASIL_ZAMIRLAR:zamirFilter==='muttasil'?MUTTASIL_ZAMIRLAR:ALL_ZAMIRLAR;
  if(!zamirQuizState){
    const questions = shuffle(pool).map(z=>{
      const others=shuffle(ALL_ZAMIRLAR.filter(x=>x.ar!==z.ar)).slice(0,3);
      const dir=Math.random()<.5?'ar2uz':'uz2ar';
      return {z, dir, choices:shuffle([z,...others])};
    });
    zamirQuizState={questions,idx:0,results:[],combo:0,answered:false,selected:null,timeLeft:selectedTime,timer:null,correctCount:0};
  }
  const qs=zamirQuizState;

  const wrap=div({minHeight:'100vh',background:'#0F1419',color:'#E8E6E1',position:'relative'});
  const inner=div({maxWidth:'440px',margin:'0 auto',padding:'0 16px 40px'});

  // Back button header
  const qHdr=div({padding:'10px 0 4px',display:'flex',alignItems:'center',gap:'8px'});
  const backBtnZ=el('button',{
    style:{background:'#161D27',border:'1px solid #2A3545',borderRadius:'8px',
      padding:'5px 10px',color:'#7A8B99',fontSize:'11px'},
    onClick:()=>{
      clearInterval(qs.timer);
      screen='zamirlar';render();
    }
  },['← Орқа']);
  qHdr.appendChild(backBtnZ);
  inner.appendChild(qHdr);

  const qArea=div({id:'zq-area'});
  inner.appendChild(qArea);

  function startTimer(){
    clearInterval(qs.timer);
    qs.timeLeft=selectedTime; qs.timer=setInterval(()=>{
      qs.timeLeft--;
      if(qs.timeLeft<=0){clearInterval(qs.timer);handleZAnswer(null,true);}
      else updateZTimer();
    },1000);
  }

  function handleZAnswer(choice,auto){
    if(qs.answered)return;
    clearInterval(qs.timer);
    qs.answered=true;
    const q=qs.questions[qs.idx];
    const correct=!auto&&choice&&choice.ar===q.z.ar;
    qs.selected=auto?{ar:'__timeout__'}:choice;
    if(auto)sndTimeout();
    else if(correct){sndCorrect();qs.combo++;qs.correctCount++;if(qs.correctCount===20)setTimeout(launchFireworks,300);}
    else{sndWrong();qs.combo=0;}
    const isAr=q.dir==='ar2uz';
    qs.results.push({z:q.z,dir:q.dir,chosen:auto?null:choice,correct});
    updateZUI(q,isAr,correct,auto);
    setTimeout(()=>{
      if(qs.idx<qs.questions.length-1){qs.idx++;qs.answered=false;qs.selected=null;renderZQ();startTimer();}
      else finishZQuiz();
    },1100);
  }

  function updateZUI(q,isAr,correct,auto){
    document.querySelectorAll('#zq-area .zchoice').forEach((b,i)=>{
      const ch=q.choices[i];
      if(ch.ar===q.z.ar){b.style.background='#0a2e18';b.style.borderColor='#3CB371';}
      else if(qs.selected&&ch.ar===qs.selected.ar){b.style.background='#2e0a0a';b.style.borderColor='#C0392B';}
      b.disabled=true;
    });
    const fb=document.getElementById('z-feedback');
    if(fb){
      fb.style.cssText='text-align:center;padding:7px 12px;border-radius:8px;font-size:11px;font-weight:600;margin-top:6px;';
      if(auto){fb.style.background='#2a1e0822';fb.style.color='#E87D54';fb.style.border='1px solid #E87D5433';
        fb.textContent='⏰ Вақт тугади! → '+(isAr?q.z.uz:q.z.ar);}
      else if(correct){fb.style.background='#0a2e1822';fb.style.color='#3CB371';fb.style.border='1px solid #3CB37133';
        fb.textContent='✅ Тўғри!';}
      else{fb.style.background='#2e0a0a22';fb.style.color='#E87D54';fb.style.border='1px solid #C0392B33';
        fb.textContent='❌ Тўғриси: '+(isAr?q.z.uz:q.z.ar);}
    }
  }

  function updateZTimer(){
    const tf=document.getElementById('ztimer-fill');
    const tn=document.getElementById('ztimer-num');
    if(tf) tf.style.width=(qs.timeLeft/20*100)+'%';
    if(tn) tn.textContent=qs.timeLeft+'с';
  }

  function finishZQuiz(){
    clearInterval(qs.timer);
    const zp=loadZamirlarProgress();
    const newL=new Set(zp.learned);
    qs.results.forEach(r=>{if(r.correct)newL.add(r.z.ar);});
    const correct=qs.results.filter(r=>r.correct).length;
    zp.learned=newL;
    zp.rounds=[...zp.rounds,{date:new Date().toLocaleDateString('uz-UZ'),score:correct,total:qs.results.length}];
    saveZamirlarProgress(zp);
    screen='zamirlar_results'; render();
  }

  function renderZQ(){
    const q=qs.questions[qs.idx];
    const isAr=q.dir==='ar2uz';
    qArea.innerHTML=''; qArea.className='fade-in';

    const hdr=div({padding:'14px 0 8px'});
    const hr=div({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'});
    hr.appendChild(h('span',{fontSize:'11px',color:'#7A8B99',background:'#161D27',border:'1px solid #2A3545',borderRadius:'20px',padding:'3px 10px'},
      'Замирлар · '+(qs.idx+1)+'/'+qs.questions.length));
    const hr2=div({display:'flex',gap:'8px',alignItems:'center'});
    if(qs.combo>=2) hr2.appendChild(h('span',{fontSize:'11px',fontWeight:'700',background:'#5B8FD633',border:'1px solid #5B8FD666',borderRadius:'20px',padding:'3px 10px',color:'#5B8FD6'},'🔥 x'+qs.combo));
    hr2.appendChild(h('span',{fontSize:'11px',background:'#0a2e18',border:'1px solid #3CB37166',borderRadius:'20px',padding:'3px 10px',color:'#3CB371'},'✅ '+qs.results.filter(r=>r.correct).length));
    hr.appendChild(hr2); hdr.appendChild(hr);
    const pb=div({height:'3px',background:'#1C2533',borderRadius:'2px'});
    pb.appendChild(div({height:'3px',background:'linear-gradient(90deg,#5B8FD6,#7BB3F0)',borderRadius:'2px',width:(qs.idx/qs.questions.length*100)+'%'}));
    hdr.appendChild(pb); qArea.appendChild(hdr);

    // Badge
    const badge=div({display:'flex',gap:'6px',marginBottom:'6px'});
    badge.appendChild(h('span',{fontSize:'9px',color:'#5B8FD6',background:'#5B8FD611',border:'1px solid #5B8FD644',borderRadius:'10px',padding:'2px 8px',letterSpacing:'1px'},
      '🔤 '+q.z.tur+' · '+(isAr?'Арабча → Ўзбекча':'Ўзбекча → Арабча')));
    qArea.appendChild(badge);

    // Card
    const card=div({background:'#161D27',border:'1px solid #2A3545',borderRadius:'16px',padding:'18px 16px 14px',marginBottom:'10px'});
    card.appendChild(h('div',{textAlign:'center',fontSize:'9px',letterSpacing:'2px',color:'#5B8FD6',textTransform:'uppercase',marginBottom:'10px'},
      isAr?'Арабча замир → Ўзбекча':'Ўзбекча → Арабча замир'));
    card.appendChild(h('div',{textAlign:'center',minHeight:'52px',display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:isAr?'40px':'15px',color:'#5B8FD6',lineHeight:'1.4',
      fontFamily:isAr?'Georgia,serif':'inherit',direction:isAr?'rtl':'ltr',marginBottom:'8px'},
      isAr?q.z.ar:q.z.uz));
    // Example hint
    card.appendChild(h('div',{textAlign:'center',fontSize:'12px',color:'#4A5B6A',fontFamily:'Georgia,serif',direction:'rtl'},q.z.misol));

    const tb=div({height:'5px',background:'#0F1419',borderRadius:'3px',overflow:'hidden'});
    tb.appendChild(div({id:'ztimer-fill',height:'5px',background:'#5B8FD6',borderRadius:'3px',width:'100%',transition:'width 1s linear'}));
    card.appendChild(tb);
    const tr=div({display:'flex',justifyContent:'space-between',fontSize:'10px',marginTop:'3px'});
    tr.appendChild(h('span',{color:'#4A5B6A'},'الضَّمَائِرُ'));
    tr.appendChild(h('span',{id:'ztimer-num',color:'#4A5B6A'},qs.timeLeft+'с'));
    card.appendChild(tr);
    qArea.appendChild(card);

    // Choices
    const cd=div({display:'flex',flexDirection:'column',gap:'7px',marginBottom:'9px'});
    q.choices.forEach(ch=>{
      const isChoice=q.dir==='uz2ar';
      const cb=el('button',{
        style:{padding:'11px 14px',borderRadius:'11px',border:'1.5px solid #2A3545',
          background:'#1C2533',color:'#E8E6E1',fontSize:isChoice?'22px':'12px',
          fontFamily:isChoice?'Georgia,serif':'inherit',direction:isChoice?'rtl':'ltr',
          textAlign:'center',lineHeight:'1.4',width:'100%'},
        onClick:()=>handleZAnswer(ch)
      },[isChoice?ch.ar:T(ch.uz)]);
      cb.className='zchoice'; cd.appendChild(cb);
    });
    qArea.appendChild(cd);
    qArea.appendChild(div({id:'z-feedback',minHeight:'30px'}));
  }

  renderZQ(); startTimer();
  wrap.appendChild(inner);
  return wrap;
}

let lugatSearch = '';
let lugatCatFilter = 'all';

function renderLugatDaftar(){
  state = loadProgress();
  const wrap = div({minHeight:'100vh',background:'#0F1419',color:'#E8E6E1',overflowY:'auto'});
  const inner = div({maxWidth:'440px',margin:'0 auto',padding:'0 16px 48px'});

  // Header
  const hdr=div({display:'flex',alignItems:'center',gap:'10px',padding:'14px 0 10px'});
  hdr.appendChild(el('button',{
    style:{background:'#161D27',border:'1px solid #2A3545',borderRadius:'8px',
      padding:'6px 12px',color:'#7A8B99',fontSize:'11px'},
    onClick:()=>{screen='mode';render();}
  },['← Орқа']));
  hdr.appendChild(h('div',{fontSize:'15px',fontWeight:'700',color:'#7CC87C'},'📖 Луғат дафтари'));
  inner.appendChild(hdr);

  // Stats row
  const lc=state.learned.size;
  const sr=div({display:'flex',gap:'6px',marginBottom:'10px'});
  const mkS=(v,l,c2)=>{
    const s=div({background:'#161D27',border:'1px solid '+c2+'33',borderRadius:'10px',
      padding:'7px 10px',textAlign:'center',flex:'1'});
    s.appendChild(h('div',{fontSize:'14px',fontWeight:'700',color:c2},String(v)));
    s.appendChild(h('div',{fontSize:'9px',color:'#4A5B6A',marginTop:'1px'},l));
    return s;
  };
  sr.appendChild(mkS(ALL_WORDS.length,'Жами','#7CC87C'));
  sr.appendChild(mkS(lc,'Ўрганилган','#C9A84C'));
  sr.appendChild(mkS(ALL_WORDS.length-lc,'Қолган','#E87D54'));
  inner.appendChild(sr);

  // Search
  const isArabicInput = s => /[\u0600-\u06FF]/.test(s);
  const stripDiac = s => s.replace(/[\u0610-\u061A\u064B-\u065F\u0670\u06D6-\u06DC\u06DF-\u06E4\u06E7\u06E8\u06EA-\u06ED]/g,'');

  const sinp=el('input',{type:'text',placeholder:'🔍 Қидириш...',
    value:lugatSearch,
    style:{width:'100%',padding:'11px 14px',borderRadius:'10px',border:'1px solid #2A3545',
      background:'#161D27',color:'#E8E6E1',
      fontSize: isArabicInput(lugatSearch)?'26px':'17px',
      direction: isArabicInput(lugatSearch)?'rtl':'ltr',
      textAlign: isArabicInput(lugatSearch)?'right':'left',
      marginBottom:'8px',display:'block',
      fontFamily:'Georgia,serif'}});

  // Лотинча → Кирилча (қидириш учун)
  function latToCyr(s){
    return s
      .replace(/sh/gi,'ш').replace(/ch/gi,'ч')
      .replace(/yu/gi,'ю').replace(/ya/gi,'я').replace(/yo/gi,'ё').replace(/ye/gi,'е')
      .replace(/o['']/gi,'ў').replace(/oʻ/gi,'ў').replace(/g['']/gi,'ғ')
      .replace(/ts/gi,'ц').replace(/q/gi,'қ')
      .replace(/a/gi,'а').replace(/b/gi,'б').replace(/d/gi,'д')
      .replace(/e/gi,'э').replace(/f/gi,'ф').replace(/g/gi,'г')
      .replace(/h/gi,'ҳ').replace(/i/gi,'и').replace(/j/gi,'ж')
      .replace(/k/gi,'к').replace(/l/gi,'л').replace(/m/gi,'м')
      .replace(/n/gi,'н').replace(/o/gi,'о').replace(/p/gi,'п')
      .replace(/r/gi,'р').replace(/s/gi,'с').replace(/t/gi,'т')
      .replace(/u/gi,'у').replace(/v/gi,'в').replace(/x/gi,'х')
      .replace(/y/gi,'й').replace(/z/gi,'з');
  }

  function rebuildList(){
    const raw=lugatSearch.trim();
    const q=raw.toLowerCase();
    const qS=stripDiac(q);
    const isLatin=/[a-zA-Z']/.test(raw) && !/[\u0400-\u04FF]/.test(raw);
    const qCyr=isLatin?latToCyr(q):q;
    let filtered=ALL_WORDS;
    if(lugatCatFilter!=='all') filtered=filtered.filter(w=>w.cat===lugatCatFilter);
    if(q) filtered=filtered.filter(w=>
      stripDiac(w.ar).includes(qS)||
      w.ar.includes(raw)||
      w.uz.toLowerCase().includes(q)||
      w.uz.toLowerCase().includes(qCyr)||
      T(w.uz).toLowerCase().includes(q)
    );
    // Хато сони бўйича тартиблаш: кўп хато → юқорида, ўрганилганлар охирига
    const mistakes = state.mistakes || {};
    filtered.sort((a,b)=>{
      const learnedA = state.learned.has(a.ar) ? 1 : 0;
      const learnedB = state.learned.has(b.ar) ? 1 : 0;
      if(learnedA !== learnedB) return learnedA - learnedB; // ўрганилмаганлар аввал
      return (mistakes[b.ar]||0) - (mistakes[a.ar]||0); // кўп хато → юқорида
    });

    countEl.textContent=filtered.length+' та сўз';
    listWrap.innerHTML='';
    filtered.forEach(w=>{
      const learned=state.learned.has(w.ar);
      const mistakeCount = mistakes[w.ar] || 0;
      const card=div({display:'flex',alignItems:'center',gap:'10px',
        padding:'10px 12px',marginBottom:'6px',borderRadius:'11px',
        background:learned?'#0a1a0e': mistakeCount>2?'#1a0f0f':'#161D27',
        border:`1px solid ${learned?'#3CB37133': mistakeCount>2?'#C0392B33':'#2A3545'}`});
      const left=div({flex:'1'});
      left.appendChild(h('div',{fontFamily:'Georgia,serif',fontSize:'26px',color:learned?'#7CC87C':'#C9A84C',
        direction:'rtl',lineHeight:'1.3'},w.ar));
      left.appendChild(h('div',{fontSize:'12px',color:'#7A8B99',marginTop:'2px'},T(w.uz)));
      card.appendChild(left);
      const right=div({textAlign:'right',display:'flex',flexDirection:'column',alignItems:'flex-end',gap:'3px'});
      right.appendChild(h('span',{fontSize:'9px',
        background:(w.cat==='Феъллар'?'#3CB37122':w.cat==='Сифатлар'?'#C97AAE22':'#5B8FD622'),
        color:(w.cat==='Феъллар'?'#3CB371':w.cat==='Сифатлар'?'#C97AAE':'#5B8FD6'),
        border:'1px solid #2A3545',borderRadius:'6px',padding:'2px 6px'},w.cat));
      if(learned){
        right.appendChild(h('div',{fontSize:'13px'},'✅'));
      } else if(mistakeCount>0){
        right.appendChild(h('div',{fontSize:'10px',fontWeight:'700',
          color: mistakeCount>4?'#E87D54': mistakeCount>2?'#C9A84C':'#7A8B99'},
          '❌×'+mistakeCount));
      }
      card.appendChild(right);
      listWrap.appendChild(card);
    });
  }

  sinp.addEventListener('input',function(){
    lugatSearch=this.value;
    const isAr = isArabicInput(this.value);
    this.style.direction = isAr?'rtl':'ltr';
    this.style.textAlign = isAr?'right':'left';
    this.style.fontSize = isAr?'26px':'17px';
    rebuildList();
  });
  inner.appendChild(sinp);

  // Category filter chips
  const cats=['all',...new Set(ALL_WORDS.map(w=>w.cat))];
  const chipWrap=div({display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'10px'});
  cats.forEach(cat=>{
    const active=lugatCatFilter===cat;
    const chip=el('button',{
      style:{padding:'4px 10px',borderRadius:'16px',fontSize:'10px',
        border:`1px solid ${active?'#7CC87C':'#2A3545'}`,
        background:active?'#7CC87C22':'transparent',
        color:active?'#7CC87C':'#4A5B6A'},
      onClick:()=>{lugatCatFilter=cat;screen='lugat';render();}
    },[cat==='all'?'Барчаси':cat]);
    chipWrap.appendChild(chip);
  });
  inner.appendChild(chipWrap);

  // Count + list (populated by rebuildList)
  const countEl=h('div',{fontSize:'10px',color:'#4A5B6A',marginBottom:'6px'},'...');
  inner.appendChild(countEl);
  const listWrap=div({});
  inner.appendChild(listWrap);
  rebuildList();

  wrap.appendChild(inner);
  return wrap;
}

    inner.appendChild(empty);
    wrap.appendChild(inner);
    return wrap;
  }

  // Stats
  const sr=div({display:'flex',gap:'6px',marginBottom:'12px'});
  const mkS=(v,l,c2)=>{
    const s=div({background:'#161D27',border:'1px solid '+c2+'33',borderRadius:'10px',

  sr.appendChild(mkS(sorted.length,'Сўз хатоси','#E87D54'));
  sr.appendChild(mkS(totalErrors,'Жами хато','#C0392B'));
  sr.appendChild(mkS(sorted[0]?sorted[0][1]:0,'Энг кўп','#FF6B6B'));
  inner.appendChild(sr);

  inner.appendChild(h('div',{fontSize:'11px',color:'#E87D54',marginBottom:'8px',fontWeight:'600'},
    '⚡ Энг кўп хато қилинган сўзлар (камайиш тартибида)'));

  sorted.forEach(([ar_word, count], i)=>{
    const word = ALL_WORDS.find(w=>w.ar===ar_word) ||
                 ALL_ZAMIRLAR.find(z=>z.ar===ar_word);
    if(!word) return;
    const intensity = Math.min(count/5, 1);
    const red = `rgba(192,57,43,${0.08+intensity*0.15})`;
    const border = `rgba(192,57,43,${0.2+intensity*0.3})`;

    const card=div({display:'flex',alignItems:'center',gap:'10px',
      padding:'10px 12px',marginBottom:'6px',borderRadius:'11px',
      background:red,border:`1px solid ${border}`});

    const rank=div({fontSize:'11px',fontWeight:'700',color:'#E87D54',
      minWidth:'22px',textAlign:'center'},[String(i+1)+'.']);
    card.appendChild(rank);

    const mid=div({flex:'1'});
    mid.appendChild(h('div',{fontFamily:'Georgia,serif',fontSize:'22px',
      color:'#E87D54',direction:'rtl',lineHeight:'1.3'},ar_word));
    mid.appendChild(h('div',{fontSize:'11px',color:'#7A8B99',marginTop:'2px'},
      word.uz||(word.misol_uz||'')));
    card.appendChild(mid);

    const badge=div({background:'#C0392B22',border:'1px solid #C0392B44',
      borderRadius:'8px',padding:'4px 10px',textAlign:'center'});
    badge.appendChild(h('div',{fontSize:'16px',fontWeight:'700',color:'#E87D54'},String(count)));
    badge.appendChild(h('div',{fontSize:'8px',color:'#7A8B99'},'марта хато'));
    card.appendChild(badge);
    inner.appendChild(card);
  });

  // Clear button
  inner.appendChild(div({height:'10px'}));
  
  const clearWrap=div({marginTop:'8px'});
  const clearBtn=el('button',{
    style:{width:'100%',padding:'12px',borderRadius:'11px',
      border:'1px solid #C0392B44',background:'#1a0a0a',
      color:'#E87D54',fontSize:'12px'},
    onClick:()=>{
      clearWrap.innerHTML='';
      const confirmBox=div({background:'#2e0a0a',border:'1px solid #C0392B66',borderRadius:'11px',padding:'12px',textAlign:'center'});
      confirmBox.appendChild(h('div',{fontSize:'12px',color:'#E87D54',marginBottom:'10px'},'Барча хатолар тарихини тозалашни тасдиқлайсизми?'));
      const row=div({display:'flex',gap:'8px'});
      row.appendChild(el('button',{
        style:{flex:'1',padding:'9px',borderRadius:'9px',border:'1px solid #C0392B',background:'#C0392B22',color:'#E87D54',fontSize:'12px',fontWeight:'700'},
        onClick:()=>{state.mistakes={};saveProgress(state);screen='xatolar';render();}
      },['🗑️ Ҳа, тозалаш']));
      row.appendChild(el('button',{
        style:{flex:'1',padding:'9px',borderRadius:'9px',border:'1px solid #2A3545',background:'#161D27',color:'#7A8B99',fontSize:'12px'},
        onClick:()=>{clearWrap.innerHTML='';clearWrap.appendChild(clearBtn);}
      },['Бекор']));
      confirmBox.appendChild(row);
      clearWrap.appendChild(confirmBox);
    }
  },['🗑️ Хатолар тарихини тозалаш']);
  clearWrap.appendChild(clearBtn);
  inner.appendChild(clearWrap);

  wrap.appendChild(inner);
  return wrap;
}

function getTotalTests(){
  const st = loadProgress();
  return (st.rounds||[]).length;
}

function getPDFWords(level){
  // level: '1/3'=80 сўз, '1/2'=120 сўз, 'full'=барчаси
  const total = ALL_WORDS.length;
  if(level==='1/3') return ALL_WORDS.slice(0, Math.floor(total/3));
  if(level==='1/2') return ALL_WORDS.slice(0, Math.floor(total/2));
  return ALL_WORDS;
}

function getPDFWordsByCat(cat){
  return ALL_WORDS.filter(w=>w.cat===cat);
}

function generatePDF(words, title, studentName){
  // Категория бўйича гуруҳлаш
  const catMap = {};
  words.forEach(w=>{
    if(!catMap[w.cat]) catMap[w.cat]={};
    catMap[w.cat][w.ar]=w.uz;
  });

  const catColors2={
    "Буюмлар":"#C9A84C","Уй":"#5B8FD6","Феъллар":"#7CC87C","Сифатлар":"#C97AAE",
    "Равишлар":"#E87D54","Иборалар":"#54C4C4","Оила":"#7CB87C","Олмошлар":"#B07CC8",
    "Кўмакчилар":"#C8A07C","Грамматика":"#C87C7C","Жойлар":"#6BA3D6","Рангlar":"#E8A87C",
    "Бошқалар":"#9B8FA8","Сонлар":"#7CB8C8","Боғловчилар":"#C8B87C","Озиқ-овқат":"#8FBB7C","Замирлар":"#7BB3F0"
  };

  let rows = '';
  Object.entries(catMap).forEach(([cat, wordMap])=>{
    const c = catColors2[cat]||'#C9A84C';
    rows += `<tr><td colspan="2" style="background:${c}22;border-left:3px solid ${c};padding:6px 10px;font-weight:700;font-size:12px;color:${c};">${cat}</td></tr>`;
    Object.entries(wordMap).forEach(([ar,uz])=>{
      rows += `<tr>
        <td style="font-family:Georgia,serif;font-size:20px;direction:rtl;text-align:right;padding:6px 10px;border-bottom:1px solid #eee;color:#1a1a2e;">${ar}</td>
        <td style="font-size:12px;padding:6px 10px;border-bottom:1px solid #eee;color:#333;">${uz}</td>
      </tr>`;
    });
  });

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>${title}</title>
<style>
  body{font-family:system-ui,sans-serif;margin:0;padding:20px;background:#fff;color:#1a1a2e;}
  h1{text-align:center;color:#C9A84C;font-size:18px;margin-bottom:4px;}
  h2{text-align:center;color:#5B8FD6;font-size:13px;font-weight:400;margin:0 0 16px;}
  .student{text-align:center;font-size:12px;color:#7A8B99;margin-bottom:12px;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  tr:nth-child(even){background:#f9f9f9;}
  @media print{body{padding:10px;}}
</style></head><body>
<h1>📖 ${title}</h1>
<h2>Алманҳажул Аъламий A1 · 5-бўлим · ${words.length} та сўз</h2>
<div class="student">Талаба: <strong>${studentName}</strong> · ${new Date().toLocaleDateString('uz-UZ')}</div>
<table>${rows}</table>
</body></html>`;

  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = title.replace(/\s+/g,'_')+'.html';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
}

  const cancelBtn=el('button',{

      background:'transparent',color:'#7A8B99',fontSize:'14px',fontWeight:'600'},
    onClick:()=>document.body.removeChild(overlay)
  },['✕ Ёпиш']);
  sheet.appendChild(cancelBtn);

  overlay.appendChild(sheet);
  overlay.addEventListener('click',(e)=>{ if(e.target===overlay) document.body.removeChild(overlay); });
  document.body.appendChild(overlay);
}


function renderHisobot(){
  state = loadProgress();
  const ach = loadAchievements();
  const rounds = state.rounds||[];
  const mistakes = state.mistakes||{};

  const wrap=div({minHeight:'100vh',background:'#0F1419',color:'#E8E6E1',overflowY:'auto'});

      padding:'7px 14px',color:'#7A8B99',fontSize:'12px',zIndex:'1'},
    onClick:()=>{screen='mode';render();}
  },['← Орқа']);
  hdr.appendChild(backBtn);
  // Марказий логотип блоки
  const heroBlock=div({textAlign:'center',padding:'10px 0 18px'});
  // Катта иконка — градиент фонда
  const iconWrap=div({
    display:'inline-flex',alignItems:'center',justifyContent:'center',
    width:'72px',height:'72px',borderRadius:'20px',
    background:'linear-gradient(135deg,#1a2a3a 0%,#0d1f35 100%)',
    border:'2px solid #5B8FD644',
    boxShadow:'0 4px 24px #5B8FD622',
    fontSize:'36px',marginBottom:'10px'
  });
  iconWrap.textContent='📊';
  heroBlock.appendChild(iconWrap);
  heroBlock.appendChild(h('div',{
    fontSize:'22px',fontWeight:'800',
    background:'linear-gradient(90deg,#5B8FD6,#C9A84C)',
    webkitBackgroundClip:'text',webkitTextFillColor:'transparent',
    backgroundClip:'text',letterSpacing:'-0.5px',lineHeight:'1.1'
  },'Ҳисобот'));
  heroBlock.appendChild(h('div',{fontSize:'11px',color:'#4A5B6A',marginTop:'3px'},'Ўрганиш натижалари'));
  hdr.appendChild(heroBlock);
  inner.appendChild(hdr);

  if(rounds.length===0){
    const empty=div({textAlign:'center',padding:'60px 20px'});
    empty.appendChild(h('div',{fontSize:'48px',marginBottom:'12px'},'📋'));
    empty.appendChild(h('div',{fontSize:'16px',fontWeight:'600',color:'#7A8B99',marginBottom:'6px'},'Ҳали маълумот йўқ'));
    empty.appendChild(h('div',{fontSize:'12px',color:'#4A5B6A'},'Тест ечинг, ҳисобот шу ерда кўринади'));
    inner.appendChild(empty);
    wrap.appendChild(inner);
    return wrap;
  }

  // 1. 4 та карточка
  const totalTests = rounds.length;
  const totalCorrect = rounds.reduce((s,r)=>s+(r.correct||r.score||0),0);
  const totalQ = rounds.reduce((s,r)=>s+(r.total||0),0);
  const avgPct = totalQ>0?Math.round(totalCorrect/totalQ*100):0;

  // Фоиз — катта блок
  const pctBlock=div({
    background:'linear-gradient(135deg,#0d1a2e,#0a1520)',
    border:'1.5px solid #5B8FD655',borderRadius:'18px',
    padding:'16px',marginBottom:'10px',textAlign:'center',
    boxShadow:'0 4px 20px #5B8FD611'
  });
  pctBlock.appendChild(h('div',{fontSize:'13px',color:'#5B8FD688',fontWeight:'600',letterSpacing:'1px'},'УМУМИЙ НАТИЖА'));
  pctBlock.appendChild(h('div',{fontSize:'52px',fontWeight:'900',color:'#5B8FD6',lineHeight:'1.1',margin:'4px 0'},avgPct+'%'));
  pctBlock.appendChild(h('div',{fontSize:'12px',color:'#4A5B6A'},totalCorrect+' тўғри / '+totalQ+' жами савол'));
  inner.appendChild(pctBlock);

  // 4 карточка
  const statsRow=div({display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'8px',marginBottom:'14px'});
  const mkCard=(emoji,val,lbl,color)=>{
    const c=div({
      background:'linear-gradient(145deg,#161D27,#0d1520)',
      border:`1px solid ${color}44`,borderRadius:'16px',
      padding:'14px 6px 10px',textAlign:'center',
      boxShadow:`0 2px 12px ${color}11`
    });
    c.appendChild(h('div',{fontSize:'22px',lineHeight:'1'},emoji));
    c.appendChild(h('div',{fontSize:'18px',fontWeight:'800',color:color,marginTop:'6px',lineHeight:'1'},String(val)));
    c.appendChild(h('div',{fontSize:'9px',color:'#5A6B7A',marginTop:'4px',fontWeight:'600'},lbl));
    return c;
  };
  statsRow.appendChild(mkCard('🔥',ach.streak,'Streak','#E87D54'));
  statsRow.appendChild(mkCard('📝',totalTests,'Тестлар','#7CC87C'));
  statsRow.appendChild(mkCard('✅',totalCorrect,'Тўғри','#7CB87C'));
  statsRow.appendChild(mkCard('❌',totalQ-totalCorrect,'Нотўғри','#E87D54'));
  inner.appendChild(statsRow);

  // 2. Категория рейтинги
  inner.appendChild(h('div',{fontSize:'11px',color:'#C9A84C',fontWeight:'600',marginBottom:'8px'},'💪 Категория рейтинги'));
  const catStats={};
  rounds.forEach(r=>{
    if(!r.catResults) return;
    Object.entries(r.catResults).forEach(([cat,res])=>{
      if(!catStats[cat]) catStats[cat]={correct:0,total:0};
      catStats[cat].correct+=res.correct||0;
      catStats[cat].total+=res.total||0;
    });
  });

  // Агар catResults йўқ бўлса, умумий rounds дан ҳисоблаш
  if(Object.keys(catStats).length===0){
    // rounds да cat маълумоти сақланмаган бўлса, mistakes дан олинади
    const catBox=div({background:'#161D27',border:'1px solid #2A3545',borderRadius:'12px',
      padding:'12px',marginBottom:'12px',textAlign:'center'});
    catBox.appendChild(h('div',{fontSize:'11px',color:'#4A5B6A'},'Категория статистикаси тўпланмоқда...'));
    catBox.appendChild(h('div',{fontSize:'10px',color:'#4A5B6A',marginTop:'4px'},'(Навбатдаги тестдан кейин кўринади)'));
    inner.appendChild(catBox);
  } else {
    const sorted2=Object.entries(catStats)
      .map(([cat,s])=>({cat,pct:s.total>0?Math.round(s.correct/s.total*100):0}))
      .sort((a,b)=>b.pct-a.pct);
    sorted2.forEach(({cat,pct})=>{
      const color=pct>=75?'#7CC87C':pct>=50?'#C9A84C':'#E87D54';
      const emoji2=pct>=75?'💪':pct>=50?'🟡':'⚠️';
      const cRow=div({display:'flex',alignItems:'center',gap:'8px',
        padding:'7px 10px',marginBottom:'5px',borderRadius:'10px',
        background:'#161D27',border:`1px solid ${color}22`});
      cRow.appendChild(h('span',{fontSize:'12px'},emoji2));
      cRow.appendChild(h('span',{fontSize:'11px',color:'#E8E6E1',flex:'1'},cat));
      const barW=div({flex:'2',height:'5px',background:'#2A3545',borderRadius:'3px',overflow:'hidden'});
      barW.appendChild(div({height:'100%',width:pct+'%',background:color,borderRadius:'3px'}));
      cRow.appendChild(barW);
      cRow.appendChild(h('span',{fontSize:'11px',fontWeight:'700',color,minWidth:'35px',textAlign:'right'},pct+'%'));
      inner.appendChild(cRow);
    });
  }

  // 3. Сўнгги 7 кун фаоллик
  inner.appendChild(h('div',{fontSize:'11px',color:'#C9A84C',fontWeight:'600',
    margin:'12px 0 8px'},'📅 Сўнгги 7 кун'));
  const days7=['Дш','Се','Чо','Па','Жу','Ша','Як'];
  const activeDates=new Set(rounds.map(r=>r.date||'').filter(Boolean));
  const weekRow=div({display:'flex',gap:'6px',marginBottom:'14px'});
  for(let i=6;i>=0;i--){
    const d=new Date(Date.now()-i*86400000);
    const dateStr=d.toLocaleDateString('uz-UZ');
    const dayName=days7[d.getDay()===0?6:d.getDay()-1];
    const active=activeDates.has(dateStr);
    const dayCol=div({display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',flex:'1'});
    dayCol.appendChild(h('div',{fontSize:'9px',color:'#4A5B6A'},dayName));
    dayCol.appendChild(div({
      width:'28px',height:'28px',borderRadius:'6px',
      background:active?'#7CC87C':'#1a2a1a',
      border:`1px solid ${active?'#7CC87C44':'#2A3545'}`,
      display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:'13px'
    },[active?'✅':'']));
    weekRow.appendChild(dayCol);
  }
  inner.appendChild(weekRow);

  // 4. Топ-3 хато
  const sortedMistakes=Object.entries(mistakes).sort((a,b)=>b[1]-a[1]).slice(0,3);
  if(sortedMistakes.length>0){
    inner.appendChild(h('div',{fontSize:'11px',color:'#E87D54',fontWeight:'600',
      marginBottom:'8px'},'❌ Энг кўп хато — топ 3'));
    sortedMistakes.forEach(([ar,cnt],i)=>{
      const word=ALL_WORDS.find(w=>w.ar===ar);
      if(!word) return;
      const mCard=div({display:'flex',alignItems:'center',gap:'10px',
        padding:'9px 12px',marginBottom:'6px',borderRadius:'11px',
        background:'#1a0808',border:'1px solid #E87D5433'});
      mCard.appendChild(h('div',{fontSize:'13px',fontWeight:'700',color:'#E87D54',
        minWidth:'18px'},String(i+1)+'.'));
      const mMid=div({flex:'1'});
      mMid.appendChild(h('div',{fontFamily:'Georgia,serif',fontSize:'20px',
        color:'#E87D54',direction:'rtl'},ar));
      mMid.appendChild(h('div',{fontSize:'10px',color:'#7A8B99'},word.uz));
      mCard.appendChild(mMid);
      mCard.appendChild(div({background:'#C0392B22',border:'1px solid #C0392B44',
        borderRadius:'8px',padding:'4px 8px',textAlign:'center',fontSize:'14px',
        fontWeight:'700',color:'#E87D54'},[String(cnt)+'x']));
      inner.appendChild(mCard);
    });
  }

  wrap.appendChild(inner);
  return wrap;
}
