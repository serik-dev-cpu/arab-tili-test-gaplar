        borderRadius:'3px'}));
      mid.appendChild(bar);
      mid.appendChild(h('div',{fontSize:'11px',color:'#5C6478'},
        '✅ '+totalTests+' / '+item.needTests+' тест · '+(item.needTests-totalTests)+' та қолди'));
    }
    row.appendChild(mid);
    row.appendChild(h('div',{fontSize:'26px',flexShrink:'0'},unlocked?'⬇️':'🔒'));

    if(unlocked){
      row.addEventListener('click',()=>{
        document.body.removeChild(overlay);
        generatePDF(getPDFWords(item.level), item.label+' — Луғат', currentName);
      });
    }
    sheet.appendChild(row);
  });

  // Категория PDF
  sheet.appendChild(div({height:'1px',background:'#262B3A',margin:'4px 0 14px'}));
  sheet.appendChild(h('div',{fontSize:'12px',color:'#D4A23A',fontWeight:'700',marginBottom:'8px'},
    '📂 Категория PDF · '+catNeed+' тест'));

  if(canCat){
    const cats2=[...new Set(ALL_WORDS.map(w=>w.cat))];
    const cg=div({display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'14px'});
    cats2.forEach(cat=>{
      const cb=el('button',{
        style:{padding:'6px 14px',borderRadius:'10px',border:'1px solid #D4A23A55',
          background:'#1e1a0a',color:'#D4A23A',fontSize:'12px',fontWeight:'600'},
        onClick:()=>{
          document.body.removeChild(overlay);
          generatePDF(getPDFWordsByCat(cat), cat+' — Луғат', currentName);
        }
      },[cat]);
      cg.appendChild(cb);
    });
    sheet.appendChild(cg);
  } else {
    const catRow=div({
      display:'flex',alignItems:'center',gap:'12px',
      background:'#0B0E14',border:'1.5px solid #262B3A',
      borderRadius:'14px',padding:'14px 16px',marginBottom:'14px'
    });
    catRow.appendChild(h('div',{fontSize:'28px'},'📂'));
    const catMid=div({flex:'1'});
    const catBar=div({height:'6px',background:'#262B3A',borderRadius:'3px',overflow:'hidden',marginBottom:'4px'});
    catBar.appendChild(div({height:'100%',width:Math.min(totalTests/catNeed*100,100)+'%',
      background:'linear-gradient(90deg,#D4A23A88,#D4A23A)',borderRadius:'3px'}));
    catMid.appendChild(catBar);
    catMid.appendChild(h('div',{fontSize:'11px',color:'#5C6478'},
      '✅ '+totalTests+' / '+catNeed+' тест · '+(catNeed-totalTests)+' та қолди'));
    catRow.appendChild(catMid);
    catRow.appendChild(h('div',{fontSize:'24px'},'🔒'));
    sheet.appendChild(catRow);
  }

  const cancelBtn=el('button',{
    style:{width:'100%',padding:'14px',borderRadius:'14px',border:'1px solid #262B3A',
      background:'transparent',color:'#8891A3',fontSize:'14px',fontWeight:'600'},
    onClick:()=>document.body.removeChild(overlay)
  },['✕ Ёпиш']);
  sheet.appendChild(cancelBtn);

  overlay.appendChild(sheet);
  overlay.addEventListener('click',(e)=>{ if(e.target===overlay) document.body.removeChild(overlay); });
  document.body.appendChild(overlay);
}


const UZ_MONTHS_CYR=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
function mondayOf(d){
  const dt=new Date(d);
  const day=(dt.getDay()+6)%7; // Дшб=0 ... Якш=6
  dt.setDate(dt.getDate()-day);
  dt.setHours(0,0,0,0);
  return dt;
}
function renderHisobot(){
  state = loadProgress();
  const ach = loadAchievements();
  const zp = loadZamirlarProgress();
  const rounds = state.rounds||[];
  const mistakes = state.mistakes||{};
  // Замир тести натижалари ҳам умумий ҳисоботга қўшилади
  const combinedRounds = rounds.concat((zp.rounds||[]).map(r=>({...r,mode:'zamir',isZamir:true})));

  const wrap=div({minHeight:'100vh',background:'#0B0E14',color:'#EDEFF5',overflowY:'auto'});
  const inner=div({maxWidth:'440px',margin:'0 auto',padding:'0 16px 48px'});

  // Header
  const hdr=div({padding:'14px 0 4px',position:'relative'});
  const backBtn=el('button',{
    style:{position:'absolute',top:'14px',left:'0',background:'#161A24',
      border:'1px solid #262B3A',borderRadius:'10px',
      padding:'7px 14px',color:'#8891A3',fontSize:'12px',zIndex:'1'},
    onClick:()=>{screen='mode';render();}
  },['← Орқа']);
  hdr.appendChild(backBtn);
  const heroBlock=div({textAlign:'center',padding:'10px 0 18px'});
  const iconWrap=div({
    display:'inline-flex',alignItems:'center',justifyContent:'center',
    width:'72px',height:'72px',borderRadius:'20px',
    background:'linear-gradient(135deg,#1a2a3a 0%,#0d1f35 100%)',
    border:'2px solid #7C8FE844',
    boxShadow:'0 4px 24px #7C8FE822',
    fontSize:'36px',marginBottom:'10px'
  });
  iconWrap.textContent='📊';
  heroBlock.appendChild(iconWrap);
  heroBlock.appendChild(h('div',{
    fontSize:'22px',fontWeight:'800',
    background:'linear-gradient(90deg,#7C8FE8,#D4A23A)',
    webkitBackgroundClip:'text',webkitTextFillColor:'transparent',
    backgroundClip:'text',letterSpacing:'-0.5px',lineHeight:'1.1'
  },'Ҳисобот'));
  heroBlock.appendChild(h('div',{fontSize:'11px',color:'#5C6478',marginTop:'3px'},'Ўрганиш натижалари'));
  hdr.appendChild(heroBlock);
  inner.appendChild(hdr);

  if(combinedRounds.length===0){
    const empty=div({textAlign:'center',padding:'60px 20px'});
    empty.appendChild(h('div',{fontSize:'48px',marginBottom:'12px'},'📋'));
    empty.appendChild(h('div',{fontSize:'16px',fontWeight:'600',color:'#8891A3',marginBottom:'6px'},'Ҳали маълумот йўқ'));
    empty.appendChild(h('div',{fontSize:'12px',color:'#5C6478'},'Тест ечинг, ҳисобот шу ерда кўринади'));
    inner.appendChild(empty);
    wrap.appendChild(inner);
    return wrap;
  }

  // ═══ КУН/ҲАФТА ҲИСОБИ (кун соат 04:00да бошланади) ═══
  const todayRef = appDayDate(new Date());
  const todayDateOnly = new Date(todayRef.getFullYear(), todayRef.getMonth(), todayRef.getDate());
  const monday = mondayOf(todayDateOnly);
  const todayKey = appDayKey();
  const days7=['Du','Se','Ch','Pa','Ju','Sh','Ya'];

  const weekDays=[];
  for(let i=0;i<7;i++){
    const dayDate=new Date(monday); dayDate.setDate(monday.getDate()+i);
    const dateStr=dayDate.toLocaleDateString('uz-UZ');
    const dRounds=combinedRounds.filter(r=>r.date===dateStr);
    const correct=dRounds.reduce((s,r)=>s+(r.correct||r.score||0),0);
    const total=dRounds.reduce((s,r)=>s+(r.total||0),0);
    const xp=dRounds.reduce((s,r)=>s+(typeof r.xp==='number'?r.xp:0),0);
    weekDays.push({dateStr,dayDate,correct,total,xp,testCount:dRounds.length,
      isToday:dateStr===todayKey, isFuture:dayDate>todayDateOnly});
  }
  const weekCorrect=weekDays.reduce((s,d)=>s+d.correct,0);
  const weekTotal=weekDays.reduce((s,d)=>s+d.total,0);
  const weekPct=weekTotal>0?Math.round(weekCorrect/weekTotal*100):0;
  const weekXP=weekDays.reduce((s,d)=>s+d.xp,0);
  const weekTests=weekDays.reduce((s,d)=>s+d.testCount,0);
  const perfectDaysThisWeek=weekDays.filter(d=>d.total>0&&d.correct===d.total).length;
  const bestDay=weekDays.reduce((best,d)=>(d.testCount>(best?best.testCount:0))?d:best,null);

  // Ўтган ҳафта билан солиштириш (ўсиш белгиси учун)
  const prevMonday=new Date(monday); prevMonday.setDate(monday.getDate()-7);
  let prevCorrect=0, prevTotal=0;
  for(let i=0;i<7;i++){
    const dd=new Date(prevMonday); dd.setDate(prevMonday.getDate()+i);
    const ds=dd.toLocaleDateString('uz-UZ');
    combinedRounds.filter(r=>r.date===ds).forEach(r=>{prevCorrect+=(r.correct||r.score||0); prevTotal+=(r.total||0);});
  }
  const prevPct = prevTotal>0 ? Math.round(prevCorrect/prevTotal*100) : null;
  let growthBadge;
  if(weekTotal===0) growthBadge=null;
  else if(prevPct===null) growthBadge={emoji:'🌱',txt:'Биринчи ҳафта!'};
  else if(weekPct>prevPct) growthBadge={emoji:'📈',txt:'Барқарор ўсиш!'};
  else if(weekPct===prevPct) growthBadge={emoji:'⚖️',txt:'Барқарор натижа'};
  else growthBadge={emoji:'💪',txt:'Давом эт, кучайяпсан!'};

  const lvl=getLevelInfo(ach.xp);

  // ═══ 1. ҲАФТА ЯКУНИ — катта градиент карта (odatim услубида) ═══
  const sunday=new Date(monday); sunday.setDate(monday.getDate()+6);
  const weekLabel = monday.getDate()+' – '+sunday.getDate()+' '+UZ_MONTHS_CYR[sunday.getMonth()]+' '+sunday.getFullYear();

  const weekHero=div({
    background:'linear-gradient(150deg,#11182b 0%,#0a1020 60%,#0d1a14 100%)',
    border:'1.5px solid #7C8FE844',borderRadius:'22px',
    padding:'18px 16px',marginBottom:'12px',position:'relative',overflow:'hidden',
    boxShadow:'0 6px 28px #7C8FE81a'
  });
  const weekTopRow=div({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'});
  weekTopRow.appendChild(h('span',{fontSize:'10px',fontWeight:'700',color:'#7C8FE8',
    background:'#7C8FE822',border:'1px solid #7C8FE844',borderRadius:'20px',padding:'4px 10px',letterSpacing:'0.5px'},'📅 ҲАФТА ЯКУНИ'));
  weekTopRow.appendChild(h('span',{fontSize:'11px',color:'#8891A3',fontWeight:'600'},weekLabel));
  weekHero.appendChild(weekTopRow);

  const weekBody=div({display:'flex',alignItems:'center',gap:'16px'});
  // % доира
  const ringSize=92, ringStroke=9;
  const rr=(ringSize-ringStroke)/2, circ=2*Math.PI*rr;
  const dashOffset=circ*(1-weekPct/100);
  const ringColor=weekPct>=75?'#6FBF8B':weekPct>=40?'#D4A23A':weekPct>0?'#E8765C':'#3A4256';
  const ringWrap=div({position:'relative',width:ringSize+'px',height:ringSize+'px',flexShrink:'0'});
  ringWrap.innerHTML=`<svg width="${ringSize}" height="${ringSize}" style="transform:rotate(-90deg)">
    <circle cx="${ringSize/2}" cy="${ringSize/2}" r="${rr}" fill="none" stroke="#262B3A" stroke-width="${ringStroke}"/>
    <circle cx="${ringSize/2}" cy="${ringSize/2}" r="${rr}" fill="none" stroke="${ringColor}" stroke-width="${ringStroke}"
      stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${dashOffset}"
      style="filter:drop-shadow(0 0 6px ${ringColor}77)"/>
  </svg>
  <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;">
    <span style="font-size:24px;font-weight:900;color:${ringColor};line-height:1">${weekPct}<span style="font-size:13px">%</span></span>
    <span style="font-size:8px;color:#5C6478;margin-top:1px">${weekCorrect}/${weekTotal}</span>
  </div>`;
  weekBody.appendChild(ringWrap);

  const weekTxt=div({flex:'1'});
  weekTxt.appendChild(h('div',{fontSize:'12px',color:'#8891A3'},'Ҳафталик натижангиз тайёр'));
  weekTxt.appendChild(h('div',{fontSize:'19px',fontWeight:'800',color:'#EDEFF5',margin:'2px 0 8px',lineHeight:'1.1'},currentName||'Талаба'));
  if(growthBadge){
    weekTxt.appendChild(h('div',{display:'inline-block',fontSize:'11px',fontWeight:'700',color:'#D4A23A',
      background:'#D4A23A1a',border:'1px solid #D4A23A44',borderRadius:'20px',padding:'4px 10px',marginBottom:'6px'},
      growthBadge.emoji+' '+growthBadge.txt));
  }
  weekTxt.appendChild(div({height:'4px'}));
  weekTxt.appendChild(h('div',{display:'inline-block',fontSize:'10px',fontWeight:'700',color:'#7C8FE8',
    background:'#7C8FE81a',border:'1px solid #7C8FE844',borderRadius:'20px',padding:'3px 9px'},
    '🥉 '+lvl.level+'-даража · '+lvl.label));
  weekBody.appendChild(weekTxt);
  weekHero.appendChild(weekBody);

  // Кейинги даражагача прогресс
  if(lvl.nextAt){
    const lvlBar=div({marginTop:'12px'});
    const lvlRow=div({display:'flex',justifyContent:'space-between',marginBottom:'4px'});
    lvlRow.appendChild(h('span',{fontSize:'9px',color:'#5C6478'},'Кейинги даражагача'));
    lvlRow.appendChild(h('span',{fontSize:'9px',color:'#5C6478',fontWeight:'700'},lvl.xp+' / '+lvl.nextAt+' Илм'));
    lvlBar.appendChild(lvlRow);
    const track=div({height:'6px',background:'#1a1d28',borderRadius:'4px',overflow:'hidden'});
    track.appendChild(div({height:'100%',width:lvl.pct+'%',
      background:'linear-gradient(90deg,#7C8FE8,#D4A23A)',borderRadius:'4px'}));
    lvlBar.appendChild(track);
    weekHero.appendChild(lvlBar);
  }
  inner.appendChild(weekHero);

  // ═══ 2. 3 та статистика-карта (odatim услубида) ═══
  const stats3=div({display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',marginBottom:'12px'});
  const mkBigCard=(emoji,val,lbl,sub,color)=>{
    const c=div({background:'#161A24',border:`1px solid ${color}33`,borderRadius:'16px',
      padding:'12px 8px',textAlign:'center'});
    c.appendChild(div({display:'inline-flex',alignItems:'center',justifyContent:'center',
      width:'30px',height:'30px',borderRadius:'9px',background:color+'22',marginBottom:'7px',fontSize:'15px'},emoji));
    c.appendChild(h('div',{fontSize:'21px',fontWeight:'800',color:'#EDEFF5',lineHeight:'1'},String(val)));
    c.appendChild(h('div',{fontSize:'10px',color:'#8891A3',fontWeight:'600',marginTop:'5px'},lbl));
    c.appendChild(h('div',{fontSize:'8px',color:'#5C6478',marginTop:'1px'},sub));
    return c;
  };
  stats3.appendChild(mkBigCard('✅',perfectDaysThisWeek,'Мукаммал кун','100% бажарилган','#6FBF8B'));
  stats3.appendChild(mkBigCard('⚡',weekXP,'Илм бу ҳафта','Фаолллик мукофоти','#7C8FE8'));
  stats3.appendChild(mkBigCard('🔥',ach.streak,'Кун сериya','Энди тўхтаманг!','#E8765C'));
  inner.appendChild(stats3);

  // ═══ 3. ҲАФТА ДАВОМИДА — кунлар бўйича устунлар (Du-Ya) ═══
  const weekCard=div({className:'premium-surface',style:{padding:'14px 10px 12px',marginBottom:'12px'}});
  const wHdr=div({display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'});
  wHdr.appendChild(h('span',{fontSize:'11px',color:'#D4A23A',fontWeight:'700',letterSpacing:'0.5px'},'▎ҲАФТА ДАВОМИДА'));
  if(bestDay && bestDay.testCount>0){
    wHdr.appendChild(h('span',{fontSize:'10px',color:'#8891A3'},'энг зўр кун — 👑'));
  }
  weekCard.appendChild(wHdr);
  const weekRow=div({display:'flex',gap:'6px',alignItems:'flex-end'});
  const barMaxH=70;
  const maxCount=Math.max(1,...weekDays.map(d=>d.testCount));
  weekDays.forEach((d,i)=>{
    const dPct = d.total>0 ? Math.round(d.correct/d.total*100) : 0;
    const isBest = bestDay && d.testCount>0 && d.testCount===bestDay.testCount;
    const barColor = d.testCount===0?'#262B3A':(dPct>=75?'#6FBF8B':dPct>=40?'#D4A23A':'#E8765C');
    const hPct = d.testCount>0 ? Math.max(18,Math.round(d.testCount/maxCount*100)) : 8;
    const dayCol=div({display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',flex:'1',position:'relative'});
    if(isBest) dayCol.appendChild(h('div',{fontSize:'12px',position:'absolute',top:'-18px'},'👑'));
    const barOuter=div({width:'100%',height:barMaxH+'px',display:'flex',alignItems:'flex-end',justifyContent:'center',marginTop:'14px'});
    const barInner=div({
      width:'100%',maxWidth:'30px',
      height:(hPct/100*barMaxH)+'px',
      minHeight:'8px',borderRadius:'9px',
      background:d.testCount>0?(isBest?'linear-gradient(180deg,#F2C84B,#D4A23A)':barColor):'#1a1d28',
      boxShadow:d.testCount>0?`0 0 8px ${isBest?'#D4A23A':barColor}44`:'none',
      display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:'4px'
    });
    if(d.testCount>0){
      barInner.appendChild(h('span',{fontSize:'11px',fontWeight:'800',
        color:isBest?'#3a2a05':'#0B0E14'},String(d.testCount)));
    }
    barOuter.appendChild(barInner);
    dayCol.appendChild(barOuter);
    dayCol.appendChild(h('div',{fontSize:'9px',fontWeight:d.isToday?'800':'500',
      color:d.isToday?'#D4A23A':'#5C6478'},days7[i]));
    weekRow.appendChild(dayCol);
  });
  weekCard.appendChild(weekRow);
  inner.appendChild(weekCard);

  // ═══ 4. УМУМИЙ (барча вақт) — 4 кичик карта ═══
  const totalTests = combinedRounds.length;
  const totalCorrect = combinedRounds.reduce((s,r)=>s+(r.correct||r.score||0),0);
  const totalQ = combinedRounds.reduce((s,r)=>s+(r.total||0),0);
  const avgPct = totalQ>0?Math.round(totalCorrect/totalQ*100):0;
  inner.appendChild(h('div',{fontSize:'11px',color:'#7C8FE8',fontWeight:'700',margin:'4px 0 8px'},'▎УМУМИЙ (барча вақт)'));
  const statsRow=div({display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:'8px',marginBottom:'14px'});
  const mkCard=(emoji,val,lbl,color)=>{
    const c=div({
      background:'linear-gradient(145deg,#161A24,#0d1520)',
      border:`1px solid ${color}44`,borderRadius:'16px',
      padding:'14px 6px 10px',textAlign:'center',
      boxShadow:`0 2px 12px ${color}11`
    });
    c.appendChild(h('div',{fontSize:'22px',lineHeight:'1'},emoji));
    c.appendChild(h('div',{fontSize:'18px',fontWeight:'800',color:color,marginTop:'6px',lineHeight:'1'},String(val)));
    c.appendChild(h('div',{fontSize:'9px',color:'#5A6B7A',marginTop:'4px',fontWeight:'600'},lbl));
    return c;
  };
  statsRow.appendChild(mkCard('📝',totalTests,'Тестлар','#6FBF8B'));
  statsRow.appendChild(mkCard('🎯',avgPct+'%','Ўрт. фоиз','#7C8FE8'));
  statsRow.appendChild(mkCard('✅',totalCorrect,'Тўғри','#7CB87C'));
  statsRow.appendChild(mkCard('❌',totalQ-totalCorrect,'Нотўғри','#E8765C'));
  inner.appendChild(statsRow);

  // ═══ 4.1 РЕЖИМ БЎЙИЧА — Гап тузиш билан бошқа тестларни алохида кўрсатиш ═══
  const gapRounds = combinedRounds.filter(r=>r.mode==='gaptuzish');
  const otherRounds = combinedRounds.filter(r=>r.mode!=='gaptuzish');
  const mkModeRow=(rs)=>{
    const c = rs.reduce((s,r)=>s+(r.correct||r.score||0),0);
    const t = rs.reduce((s,r)=>s+(r.total||0),0);
    return {count:rs.length, correct:c, total:t, pct: t>0?Math.round(c/t*100):0};
  };
  const gapAgg = mkModeRow(gapRounds);
  const otherAgg = mkModeRow(otherRounds);
  if(gapRounds.length>0 || otherRounds.length>0){
    const modeSplit = div({display:'flex',flexDirection:'column',gap:'8px',marginBottom:'14px'});
    const mkModeCard=(emoji,label,agg,color)=>{
      const row = div({
        background:'linear-gradient(145deg,#161A24,#0d1520)',
        border:`1px solid ${color}33`,borderRadius:'14px',
        padding:'12px 14px',display:'flex',alignItems:'center',gap:'12px',
        opacity: agg.count>0 ? '1' : '0.45'
      });
      row.appendChild(h('div',{fontSize:'20px',flexShrink:'0'},emoji));
      const txt = div({flex:'1'});
      txt.appendChild(h('div',{fontSize:'12px',fontWeight:'700',color:'#EDEFF5'},label));
      txt.appendChild(h('div',{fontSize:'10px',color:'#8891A3',marginTop:'2px'},
        agg.count>0 ? (agg.count+' уриниш · '+agg.correct+'/'+agg.total+' тўғри') : 'Ҳали уриниш йўқ'));
      row.appendChild(txt);
      row.appendChild(h('div',{fontSize:'17px',fontWeight:'800',color:agg.count>0?color:'#5C6478',flexShrink:'0'},
        agg.count>0 ? (agg.pct+'%') : '—'));
      return row;
    };
    modeSplit.appendChild(mkModeCard('🎯','Тест режимлари',otherAgg,'#7C8FE8'));
    modeSplit.appendChild(mkModeCard('📝','Гап тузиш',gapAgg,'#D4A23A'));
    inner.appendChild(modeSplit);
  }

  // Бугунги фаоллик — доира индикатор
  const todayRounds=combinedRounds.filter(r=>r.date===todayKey);
  if(todayRounds.length>0){
    const tCorrect=todayRounds.reduce((s,r)=>s+(r.correct||r.score||0),0);
    const tTotal=todayRounds.reduce((s,r)=>s+(r.total||0),0);
    const tXP=todayRounds.reduce((s,r)=>s+(typeof r.xp==='number'?r.xp:0),0);
    const tPct=tTotal>0?Math.round(tCorrect/tTotal*100):0;
    const todayCard=div({className:'premium-surface',style:{
      padding:'14px 16px',marginBottom:'14px',display:'flex',alignItems:'center',gap:'14px'}});
    const ringSize2=58, ringStroke2=6;
    const r2=(ringSize2-ringStroke2)/2, circ2=2*Math.PI*r2;
    const dashOffset2=circ2*(1-tPct/100);
    const ringColor2=tPct>=75?'#6FBF8B':tPct>=40?'#D4A23A':'#E8765C';
    const ringWrap2=div({position:'relative',width:ringSize2+'px',height:ringSize2+'px',flexShrink:'0'});
    ringWrap2.innerHTML=`<svg width="${ringSize2}" height="${ringSize2}" style="transform:rotate(-90deg)">
      <circle cx="${ringSize2/2}" cy="${ringSize2/2}" r="${r2}" fill="none" stroke="#262B3A" stroke-width="${ringStroke2}"/>
      <circle cx="${ringSize2/2}" cy="${ringSize2/2}" r="${r2}" fill="none" stroke="${ringColor2}" stroke-width="${ringStroke2}"
        stroke-linecap="round" stroke-dasharray="${circ2}" stroke-dashoffset="${dashOffset2}"
        style="filter:drop-shadow(0 0 5px ${ringColor2}77)"/>
    </svg>

// ISO ҳафта калити: "2026-W25" каби
function isoWeekKey(d){
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = (dt.getUTCDay()+6)%7; // Дшб=0 ... Якш=6
  dt.setUTCDate(dt.getUTCDate()-dayNum+3);
  const firstThursday = new Date(Date.UTC(dt.getUTCFullYear(),0,4));
  const week = 1 + Math.round(((dt-firstThursday)/86400000 - 3 + ((firstThursday.getUTCDay()+6)%7))/7);
  return dt.getUTCFullYear()+'-W'+String(week).padStart(2,'0');
}
function weekRangeLabel(d){
  const day=(d.getDay()+6)%7;
  const monday=new Date(d); monday.setDate(d.getDate()-day);
  const sunday=new Date(monday); sunday.setDate(monday.getDate()+6);
  const fmt=(x)=>x.getDate()+'.'+String(x.getMonth()+1).padStart(2,'0');
  return fmt(monday)+' – '+fmt(sunday);
}

// Har daraja uchun "deck" (qolgan, hali shu tsiklda ko'rilmagan ID'lar) ni
// localStorage orqali boshqaradi. Deck tugaganda — tsikl +1, deck qayta aralashtiriladi.
const GAP_BATCH_SIZE = 5; // popupdagi "Har safar 5 tadan gap chiqadi" matniga mos
function gapTakeBatch(level){
  const st = loadProgress();
  const deck = st.gapDeck || {};
  const cycles = st.gapCycles || {oson:0,ortacha:0,profi:0,barchasi:0};
  const allIds = GAP_TUZISH_DATA.filter(g=>g.level===level).map(g=>g.id);

  let cur = deck[level];
  if(!cur || !Array.isArray(cur) || cur.length===0){
    cur = shuffle(allIds.slice());
  }

  const batchIds = cur.slice(0, GAP_BATCH_SIZE);
  let rest = cur.slice(GAP_BATCH_SIZE);
  let cycleCompleted = false;

  if(rest.length===0){
    // tsikl tugadi — keyingisi uchun qayta aralashtiramiz va sanoqni oshiramiz
    rest = shuffle(allIds.slice());
    cycles[level] = (cycles[level]||0) + 1;
    cycleCompleted = true;
  }

  deck[level] = rest;
  st.gapDeck = deck;
  st.gapCycles = cycles;
  saveProgress(st);

  const idSet = new Set(batchIds);
  const questions = GAP_TUZISH_DATA.filter(g=>idSet.has(g.id));
  // batchIds tartibida saqlaymiz (aralash holatda)
  questions.sort((a,b)=>batchIds.indexOf(a.id)-batchIds.indexOf(b.id));
  return {questions, cycleCompleted, cyclesNow: cycles[level]||0};
}

    dropZone.innerHTML='';
    if(gs.userOrder.length===0){
      dropZone.appendChild(h('div',{fontSize:'11px',color:'#5C6478',direction:'ltr'},'Тилларга тегинг ↑'));
      return;
    }
    gs.userOrder.forEach(item=>{
      dropZone.appendChild(el('button',{
        style:{fontFamily:"'Amiri','Scheherazade New',Georgia,serif",fontSize:tileFont,fontWeight:'700',
          color:'#EDEFF5',background:'#1B2030',border:'1px solid #D4A23A77',
          borderRadius:'14px 14px 14px 4px',padding:tilePad,minHeight:'48px',
          display:'inline-flex',alignItems:'center',justifyContent:'center',
          boxShadow:'0 0 10px #D4A23A22'},
        onClick:()=>{
          if(gs.answered) return;
          const idx=gs.userOrder.indexOf(item);
          if(idx<0) return;
          gs.userOrder.splice(idx,1);
          gs.remaining.push(item);
          renderTiles(); renderDrop();
        }
      },[item.word]));
    });
  }

  function checkAnswer(){
    if(gs.answered) return;
    if(gs.userOrder.length!==q.answer.length){
      sndWrong();
      return;
    }
    gs.answered=true;
    const userWords = gs.userOrder.map(it=>it.word);
    const correct = userWords.length===q.answer.length && userWords.every((w,i)=>w===q.answer[i]);

    gs.results.push({id:q.id, level:q.level, correct, cyr:q.cyr, answer:q.answer});

    // Tile rangini yangilash (to'g'ri/xato)
    Array.from(dropZone.children).forEach((el2,i)=>{
      el2.style.background = correct ? '#0d2614' : '#2e0a0a';
      el2.style.borderColor = correct ? '#6FBF8B' : '#E8765C';
      el2.style.color = correct ? '#6FBF8B' : '#E8765C';
    });

    if(correct) sndCorrect(); else sndWrong();

    // Natija qutisi
    resultArea.innerHTML='';
    const rBox = el('div',{className:correct?'medal-unlocked':'', style:{borderRadius:'16px',padding:'16px',marginBottom:'10px',textAlign:'center',
      background: correct?'linear-gradient(165deg,#0d2614,#0a1f10)':'linear-gradient(165deg,#2e0a0a,#220707)',
      border:'1px solid '+(correct?'#6FBF8B55':'#E8765C55')}});
    rBox.appendChild(h('div',{fontSize:'15px',fontWeight:'700',marginBottom:'6px',
      color:correct?'#6FBF8B':'#E8765C'}, correct?'✅ Тўғри!':'❌ Хато'));
    if(!correct){
      rBox.appendChild(h('div',{fontSize:'11px',color:'#8891A3',marginBottom:'6px'},'Тўғри жавоб:'));
      rBox.appendChild(h('div',{fontFamily:"'Amiri','Scheherazade New',Georgia,serif",fontSize:wordCount<=8?'24px':'19px',fontWeight:'700',
        color:'#D4A23A',direction:'rtl',lineHeight:'1.8',marginBottom:'4px'}, q.answer.join(' ')));
    }
    resultArea.appendChild(rBox);

    // Хатони сақлаш
    if(!correct){
      state = loadProgress();
      const gm = state.gapMistakes || {};
      gm[q.id] = (gm[q.id]||0)+1;
      state.gapMistakes = gm;
      saveProgress(state);
    } else {
      state = loadProgress();
      const gl = state.gapLearned || new Set();
      gl.add(q.id);
      state.gapLearned = gl;
      saveProgress(state);
    }

    // Davom tugmasi — faqat XATO bo'lganda ko'rsatiladi (tekshirib olish imkoni uchun).
    // TO'G'RI bo'lsa — vaqt yo'qotmay, qisqa pauzadan keyin avtomatik keyingisiga o'tadi.
    function goNext(){
      if(gs.idx+1>=gs.questions.length){
        finishGapQuiz();
      } else {
        gs.idx++; gs.answered=false; gs.userOrder=[];
        const nq=gs.questions[gs.idx];
        gs.remaining = shuffle(nq.words.map((w,i)=>({word:w,key:i})));
        screen='gaptuzish'; render();
      }
    }
    if(correct){
      setTimeout(goNext, 900);
    } else {
      const nextBtn = el('button',{
        className:'premium-btn-primary',
        style:{width:'100%',padding:'14px',fontSize:'14px',marginTop:'4px',minHeight:'48px'},
        onClick:goNext
      },[gs.idx+1>=gs.questions.length ? '🏁 Якунлаш' : 'Кейинги →']);
      resultArea.appendChild(nextBtn);
    }
  }

  renderTiles();
  renderDrop();

  wrap.appendChild(inner);
  return wrap;
}

function finishGapQuiz(){
  const gs = gapQuizState;
  const correct = gs.results.filter(r=>r.correct).length;
  const total = gs.results.length;
  const pct = total>0 ? Math.round(correct/total*100) : 0;
  const {xpGained, newlyUnlocked} = updateAchievements('gaptuzish', 'gaptuzish', correct, total);
  gs.xpGained = xpGained;
  gs.newlyUnlocked = newlyUnlocked;
  gs.done = true;
  // Гап тузиш натижасини ҳам умумий Ҳисоботга (state.rounds) қўшамиз
  state = loadProgress();
  state.rounds=[...(state.rounds||[]),{date:appDayKey(),correct,score:correct,total,pct,mode:'gaptuzish',xp:xpGained}];
  saveProgress(state);
  screen='gaptuzish_results';
  render();
  if(newlyUnlocked && newlyUnlocked.length) showAchievementToast(newlyUnlocked);
  showXPToast(xpGained);
  if(correct===total) launchFireworks();
}

function renderGapTuzishResults(){
  const gs = gapQuizState;
  const wrap = div({minHeight:'100vh',background:'#0B0E14',color:'#EDEFF5',overflowY:'auto'});
  const inner = div({maxWidth:'440px',margin:'0 auto',padding:'24px 16px 48px'});

  if(!gs){
    inner.appendChild(h('div',{textAlign:'center',color:'#8891A3',fontSize:'13px'},'Натижа топилмади.'));
    inner.appendChild(el('button',{
      style:{marginTop:'14px',width:'100%',padding:'12px',borderRadius:'11px',border:'1px solid #262B3A',
        background:'#161A24',color:'#8891A3',fontSize:'12px'},
      onClick:()=>{screen='mode';render();}
    },['← Бош меню']));
    wrap.appendChild(inner);
    return wrap;
  }

  const correct = gs.results.filter(r=>r.correct).length;
  const total = gs.results.length;
  const pct = total>0 ? Math.round(correct/total*100) : 0;

  // Цикл якунланса — унвон/мақтов блоки
  if(gs.cycleCompleted){
    const lvlName = gs.level==='oson'?'Middle':gs.level==='ortacha'?'Senior':'Expert';
    const c = gs.cyclesNow||0;
    let title='', msg='', emoji='🎉';
    if(c>=8){ emoji='🥇'; title='Магистр унвони!'; msg=lvlName+' даражасини '+c+' марта тўлиқ ўзлаштирдингиз. Сиз бу даража устасисиз!'; }
    else if(c>=5){ emoji='🥈'; title='Бакалавр унвони!'; msg=lvlName+' даражасини '+c+' марта тугатдингиз. Зўр натижа, давом этинг!'; }
    else if(c>=3){ emoji='🥉'; title='Бошланғич унвони!'; msg='Аъло! '+lvlName+' даражасини '+c+' марта тугатдингиз — 50% ўзлаштирдингиз, баракалла!'; }
    else { title='Бўлим якунланди!'; msg=lvlName+' даражасининг '+c+'-айланиши тугади. Давом этсангиз янги унвонлар очилади!'; }
    const ub = div({borderRadius:'16px',padding:'16px',marginBottom:'16px',textAlign:'center',
      background:'linear-gradient(135deg,#D4A23A22,#F0C56B11)',border:'1px solid #D4A23A55'});
    ub.appendChild(h('div',{fontSize:'34px',marginBottom:'6px'},emoji));
    ub.appendChild(h('div',{fontSize:'16px',fontWeight:'800',color:'#F0C56B',marginBottom:'4px'},title));
    ub.appendChild(h('div',{fontSize:'12px',color:'#EDEFF5',lineHeight:'1.5'},msg));
    inner.appendChild(ub);
  }

  inner.appendChild(h('div',{textAlign:'center',fontSize:'40px',marginBottom:'6px'},
    pct===100?'🏆':pct>=70?'🎉':pct>=40?'👍':'💪'));
  inner.appendChild(h('div',{textAlign:'center',fontSize:'18px',fontWeight:'800',color:'#EDEFF5',marginBottom:'4px'},
    'Гап тузиш натижаси'));
  inner.appendChild(h('div',{textAlign:'center',fontSize:'13px',color:'#8891A3',marginBottom:'18px'},
    correct+' / '+total+' тўғри ('+pct+'%)'));

  // Stats row
  const sr=div({display:'flex',gap:'8px',marginBottom:'18px'});
  const mkStat=(v,l,c)=>{
    const s=div({background:'#161A24',border:'1px solid '+c+'33',borderRadius:'12px',
      padding:'10px',textAlign:'center',flex:'1'});
    s.appendChild(h('div',{fontSize:'18px',fontWeight:'800',color:c},String(v)));
    s.appendChild(h('div',{fontSize:'9px',color:'#5C6478',marginTop:'2px'},l));
    return s;
  };
  sr.appendChild(mkStat(correct,'Тўғри','#6FBF8B'));
  sr.appendChild(mkStat(total-correct,'Хато','#E8765C'));
  sr.appendChild(mkStat('+'+(gs.xpGained||0),'Илм','#D4A23A'));
  inner.appendChild(sr);

  // Mistakes list (agar bo'lsa)
  const wrong = gs.results.filter(r=>!r.correct);
  if(wrong.length>0){
    inner.appendChild(h('div',{fontSize:'11px',color:'#E8765C',fontWeight:'600',marginBottom:'8px'},
      '❌ Хато қилинган гаплар'));
    wrong.forEach(r=>{
      const card=div({background:'#1a0a0a',border:'1px solid #E8765C33',borderRadius:'12px',
        padding:'10px 12px',marginBottom:'8px'});
      card.appendChild(h('div',{fontFamily:"'Amiri','Scheherazade New',Georgia,serif",fontSize:'20px',fontWeight:'700',
        color:'#D4A23A',direction:'rtl',lineHeight:'1.6',marginBottom:'4px'}, r.answer.join(' ')));
      card.appendChild(h('div',{fontSize:'11px',color:'#8891A3'}, r.cyr));
      inner.appendChild(card);
    });
  }

  // Buttons
  inner.appendChild(div({height:'8px'}));
  const retryBtn=el('button',{
    style:{width:'100%',padding:'14px',borderRadius:'13px',border:'none',
      background:'linear-gradient(135deg,#D4A23A,#F0C56B)',color:'#0B0E14',
      fontWeight:'700',fontSize:'15px',marginBottom:'8px'},
    onClick:()=>{gapQuizState=null;screen='gaptuzish';render();}
  },['➡️ Кейинги 5 та гап']);
  inner.appendChild(retryBtn);
  const backBtn=el('button',{
    style:{width:'100%',padding:'12px',borderRadius:'12px',border:'1px solid #262B3A',
      background:'#161A24',color:'#8891A3',fontSize:'13px'},
    onClick:()=>{gapQuizState=null;screen='mode';render();}
  },['← Бош меню']);
  inner.appendChild(backBtn);

  wrap.appendChild(inner);
  return wrap;
}

// GLOBAL TAP SOUND — ilovadagi barcha tugmalar uchun, lekin turiga qarab farqli effekt
// ═══════════════════════════════════
document.addEventListener('click', function(ev){
  const btn = ev.target.closest && ev.target.closest('button');
  if(!btn) return;
  const label = (btn.textContent||'').trim();
  if(label.indexOf('←')===0 || label.indexOf('↩')===0){
    // "Орқага" турдаги тугмалар — MP3 ўтиш эффекти
    playTransitionSound();
  } else if(btn.closest('#choice-btns') || btn.classList.contains('zchoice') ||
            btn.closest('#gap-tileszone') || btn.closest('#gap-dropzone')){
    // Сўз/жавоб тугмалари — янги юмшоқ "поп" эффект
    sndWordTap();
  } else {
    sndTap();
  }
}, true);

// ═══════════════════════════════════
// TELEFON "ORQAGA" TUGMASINI USHLASH
// ═══════════════════════════════════
// Sahifa yuklanganda brauzer tarixiga "dummy" yozuv qo'shamiz.
// Foydalanuvchi tizim "Orqaga" tugmasini bosganida, biz popstate eventini
// ushlap, uni ilova ichidagi orqaga harakatiga yo'naltiramiz.
// Bu "‹ Menyu" tugmasi sahifadan chiqib ketishining oldini oladi.
function appGoBack(){
  if(gapQuizState){ gapQuizState=null; screen='mode'; render(); return; }
  if(screen==='quiz'||screen==='mode'||screen==='vocab'||screen==='stats'){
    screen='mode'; render(); return;
  }
  // Boshqa holatlarda menyuga chiqish
  location.replace('index.html');
}

window.addEventListener('popstate', function(){
  // Har safar "Orqaga" bosilganda yangi dummy yozuv qo'shamiz (ketmaketlik)
  history.pushState({app:true}, '');
  appGoBack();
});

// INIT
// ═══════════════════════════════════
try {
  render();
  // Birinchi dummy yozuv — sahifa yuklangandan keyin
  history.pushState({app:true}, '');
} catch(e) {
  document.getElementById('app').innerHTML =
    '<div style="padding:30px;color:#E8765C;font-family:monospace;font-size:13px;background:#0B0E14;min-height:100vh">' +
    '<div style="font-size:20px;margin-bottom:12px">❌ Хато</div>' +
    '<div style="color:#EDEFF5;word-break:break-all">' + (e.message||e) + '</div>' +
    '<div style="margin-top:12px;color:#8891A3;font-size:11px">' + (e.stack||'').replace(/\n/g,'<br>') + '</div>' +
    '</div>';
}
